                            </div>
                        </div>
                        <div className="flex-1 overflow-y-auto p-4 space-y-4 pb-safe">
                            <div className="bg-white dark:bg-darkCard rounded-2xl overflow-hidden card-shadow">
                                <div className="flex items-center justify-between p-4 border-b border-gray-50 dark:border-darkBorder cursor-pointer" onClick={() => setIsDND(!isDND)}>
                                    <span className="font-bold text-textMain dark:text-darkTextMain">{t.dnd}</span>
                                    <div className={`w-12 h-6 rounded-full relative transition-colors ${isDND ? 'bg-primary' : 'bg-gray-200 dark:bg-gray-700'}`}>
                                        <div className={`absolute top-1 w-4 h-4 bg-white rounded-full transition-all ${isDND ? 'right-1' : 'left-1'}`}></div>
                                    </div>
                                </div>

                                    const nextMode = modes[(modes.indexOf(themeMode) + 1) % modes.length];
                                    setThemeMode(nextMode);
                                    showToast(language === 'zh' ? `当前选择: ${nextMode === 'system' ? '跟随系统' : nextMode === 'light' ? '浅色模式' : '深色模式'}` : `Selected: ${nextMode}`);

                                </div>
                                <div className="flex items-center justify-between p-4 cursor-pointer active:bg-gray-50 dark:active:bg-darkBorder border-b border-gray-50 dark:border-darkBorder" onClick={() => {
                                    const nextLang = language === 'zh' ? 'en' : 'zh';
                                    setLanguage(nextLang);
                                    showToast(nextLang === 'zh' ? '语言已切换为：简体中文' : 'Language switched to: English');
                                }}>
                                    <span className="font-bold text-textMain dark:text-darkTextMain">{t.lang}</span>
                                    <span className="text-textSub dark:text-darkTextSub text-sm">{language === 'zh' ? '简体中文' : 'English'} <i className="fa-solid fa-angle-right ml-2"></i></span>
                                </div>
                                <div className="flex items-center justify-between p-4 cursor-pointer active:bg-gray-50 dark:active:bg-darkBorder" onClick={() => {
                                    setCurrencySearch('');
                                    setShowDefaultCurrencyModal(true);
                                }}>
                                    <span className="font-bold text-textMain dark:text-darkTextMain">{language === 'zh' ? '默认货币' : 'Default Currency'}</span>
                                    <span className="text-textSub dark:text-darkTextSub text-sm flex items-center gap-2">
                                        <img src={`https://flagcdn.com/w20/${CURRENCY_DETAILS.find(c => c.code === defaultCurrency)?.countryCode || 'cn'}.png`} alt={defaultCurrency} className="w-4 h-auto rounded-sm object-cover" />
                                        {defaultCurrency} 
                                        <i className="fa-solid fa-angle-right"></i>
                                    </span>
                                </div>
                            </div>

                            <div className="bg-white dark:bg-darkCard rounded-2xl overflow-hidden card-shadow">
                                <div className="flex items-center justify-between p-4 cursor-pointer active:bg-gray-50 dark:active:bg-darkBorder transition-colors" onClick={() => {
                                    if(confirm(language === 'zh' ? '清除缓存会导致您需要重新登录，确定继续吗？' : 'Clearing cache will log you out. Continue?')) {
                                        window.localStorage.clear();
                                        window.location.reload();
                                    }
                                }}>
                                    <span className="font-bold text-textMain dark:text-darkTextMain">{t.clearCache}</span>
                                    <span className="text-textSub dark:text-darkTextSub text-sm"><i className="fa-solid fa-angle-right ml-2"></i></span>
                                </div>
                            </div>
                            
                            <div className="bg-white dark:bg-darkCard rounded-2xl overflow-hidden card-shadow mt-8">
                                <div className="flex items-center justify-center p-4 cursor-pointer active:bg-gray-50 dark:active:bg-darkBorder transition-colors" onClick={() => setShowLogoutConfirm(true)}>
                                    <span className="font-bold text-red-500">{t.logout}</span>
                                </div>
                            </div>
                        </div>
                    </div>
                );
            }

            // --- Screen: Terms ---
            if (activeScreen === 'terms') {
                return (
                    <div className="flex flex-col h-[100dvh] w-full bg-white dark:bg-darkBg animate-fade-in relative overflow-hidden">
                        <div className="glass-header sticky top-0 z-10 px-5 pt-safe pb-3">
                            <div className="flex items-center gap-3 mt-4">
                                <button onClick={() => setActiveScreen('about')} className="w-8 h-8 flex items-center justify-center active:scale-90 transition-transform text-textMain dark:text-darkTextMain"><i className="fa-solid fa-angle-left text-xl"></i></button>
                                <h1 className="text-xl font-bold text-textMain dark:text-darkTextMain">{t.terms}</h1>
                            </div>
                        </div>
                        <div className="flex-1 overflow-y-auto p-6 pb-safe space-y-4 text-sm text-textSub dark:text-darkTextSub leading-relaxed">
                            <h2 className="text-lg font-bold text-textMain dark:text-darkTextMain mb-2">{t.termsTitle}</h2>
                            <p>{t.termsP1}</p>
                            <h3 className="font-bold text-textMain dark:text-darkTextMain mt-6">{t.termsH1}</h3>
                            <p>{t.termsP2}</p>
                            <h3 className="font-bold text-textMain dark:text-darkTextMain mt-6">{t.termsH2}</h3>
                            <p>{t.termsP3}</p>
                            <h3 className="font-bold text-textMain dark:text-darkTextMain mt-6">{t.termsH3}</h3>
                            <p>{t.termsP4}</p>
                            <h3 className="font-bold text-textMain dark:text-darkTextMain mt-6">{t.termsH4}</h3>
                            <p>{t.termsP5}</p>
                        </div>
                    </div>
                );
            }

            // --- Screen: Privacy ---
            if (activeScreen === 'privacy') {
                return (
                    <div className="flex flex-col h-[100dvh] w-full bg-white dark:bg-darkBg animate-fade-in relative overflow-hidden">
                        <div className="glass-header sticky top-0 z-10 px-5 pt-safe pb-3">

                                <button onClick={() => setActiveScreen('about')} className="w-8 h-8 flex items-center justify-center active:scale-90 transition-transform text-textMain dark:text-darkTextMain"><i className="fa-solid fa-angle-left text-xl"></i></button>
                                <h1 className="text-xl font-bold text-textMain dark:text-darkTextMain">{t.privacy}</h1>
                            </div>
                        </div>
                        <div className="flex-1 overflow-y-auto p-6 pb-safe space-y-4 text-sm text-textSub dark:text-darkTextSub leading-relaxed">
                            <h2 className="text-lg font-bold text-textMain dark:text-darkTextMain mb-2">{t.privacyTitle}</h2>
                            <p>{t.privacyP1}</p>
                            <h3 className="font-bold text-textMain dark:text-darkTextMain mt-6">{t.privacyH1}</h3>
                            <p>{t.privacyP2}</p>
                            <h3 className="font-bold text-textMain dark:text-darkTextMain mt-6">{t.privacyH2}</h3>
                            <p>{t.privacyP3}</p>
                            <h3 className="font-bold text-textMain dark:text-darkTextMain mt-6">{t.privacyH3}</h3>
                            <p>{t.privacyP4}</p>
                            <h3 className="font-bold text-textMain dark:text-darkTextMain mt-6">{t.privacyH4}</h3>
                            <p>{t.privacyP5}</p>
                        </div>
                    </div>
                );
            }

            // --- Screen: Report Center ---
            if (activeScreen === 'report') {
                const now = new Date();
                const filteredBills = reportBills.filter(bill => {
                    const bDate = new Date(bill.date);
                    if (reportTimeRange === 'today') return bDate.getDate() === now.getDate() && bDate.getMonth() === now.getMonth() && bDate.getFullYear() === now.getFullYear();
                    if (reportTimeRange === 'this_month') return bDate.getMonth() === now.getMonth() && bDate.getFullYear() === now.getFullYear();
                    if (reportTimeRange === 'last_month') {
                        const lastMonth = new Date(now.getFullYear(), now.getMonth() - 1, 1);
                        return bDate.getMonth() === lastMonth.getMonth() && bDate.getFullYear() === lastMonth.getFullYear();
                    }
                    if (reportTimeRange === 'last_30_days') {
                        const diffTime = Math.abs(now - bDate);
                        const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24)); 
                        return diffDays <= 30;
                    }
                    if (reportTimeRange === 'this_year') return bDate.getFullYear() === now.getFullYear();
                    if (reportTimeRange === 'custom') {
                        if (!customDateRange.start && !customDateRange.end) return true;
                        let isValid = true;
                        if (customDateRange.start) {
                            const start = new Date(customDateRange.start);
                            start.setHours(0, 0, 0, 0);
                            if (bDate < start) isValid = false;
                        }
                        if (customDateRange.end) {
                            const end = new Date(customDateRange.end);
                            end.setHours(23, 59, 59, 999);
                            if (bDate > end) isValid = false;
                        }
                        return isValid;
                    }
                    return true;
                });

                let totalExpense = 0;
                const categoryMap = {};
                filteredBills.forEach(bill => {
                    const myShare = getBillShare(bill, currentUser.id);
                    totalExpense += myShare;
                    categoryMap[bill.category] = (categoryMap[bill.category] || 0) + myShare;
                });

                const sortedCategories = Object.keys(categoryMap)
                    .map(catId => ({
                        catId,
                        amount: categoryMap[catId],
                        percent: ((categoryMap[catId] / totalExpense) * 100).toFixed(1)
                    }))
                    .sort((a, b) => b.amount - a.amount);

                return (
                    <div className="flex flex-col h-full bg-[#f6f6f6] dark:bg-darkBg animate-fade-in transition-colors">
                        {/* Header (Red Gradient) */}
                        <div className="bg-gradient-to-b from-primary to-[#ff4d66] text-white pt-safe">
                            <div className="flex items-center justify-between p-4">
                                <button onClick={() => setActiveScreen('dashboard')} className="w-10 h-10 flex items-center justify-center -ml-2 active:scale-90 transition-transform">
                                    <i className="fa-solid fa-angle-left text-2xl"></i>
                                </button>
                                <div className="font-bold text-xl flex items-center gap-2">
                                    <i className="fa-solid fa-chart-simple"></i> {t.personalExpense}
                                </div>
                                <div className="w-10"></div>
                            </div>
                            
                            {/* Time Filters */}
                            <div className="flex overflow-x-auto no-scrollbar gap-6 px-4 pb-2 text-sm font-medium text-white/70">
                                {[
                                    { id: 'today', label: t.today },
                                    { id: 'all', label: t.allTime },
                                    { id: 'last_30_days', label: t.last30Days },
                                    { id: 'this_year', label: t.thisYear },
                                    { id: 'this_month', label: t.thisMonth },
                                    { id: 'last_month', label: t.lastMonth },
                                    { id: 'custom', label: t.customDate }
                                ].map(tab => (
                                    <button 
                                        key={tab.id}
                                        onClick={() => {
                                            setReportTimeRange(tab.id);
                                            setTimeout(() => window.dispatchEvent(new Event('resize')), 50);
                                        }}
                                        className={`whitespace-nowrap pb-2 transition-colors relative ${reportTimeRange === tab.id ? 'text-white font-bold' : 'hover:text-white/90'}`}
                                    >
                                        {tab.label}
                                        {reportTimeRange === tab.id && <div className="absolute bottom-0 left-0 w-full h-0.5 bg-white rounded-full"></div>}
                                    </button>
                                ))}
                            </div>
                            
                            {/* Custom Date Range Picker */}
                            {reportTimeRange === 'custom' && (
                                <div className="px-4 pb-4 flex items-center justify-between gap-2 text-sm text-white animate-fade-in">
                                    <input 
                                        type="date" 
                                        value={customDateRange.start}
                                        onChange={e => setCustomDateRange({...customDateRange, start: e.target.value})}
                                        className="bg-white/20 border border-white/30 rounded-lg px-3 py-1.5 outline-none flex-1 [color-scheme:dark]"
                                    />
                                    <span className="font-bold">{t.to}</span>
                                    <input 
                                        type="date" 
                                        value={customDateRange.end}
                                        onChange={e => setCustomDateRange({...customDateRange, end: e.target.value})}
                                        className="bg-white/20 border border-white/30 rounded-lg px-3 py-1.5 outline-none flex-1 [color-scheme:dark]"
                                    />
                                </div>
                            )}
                        </div>

                        <div className="flex-1 overflow-y-auto pb-safe">
                            {/* Total Summary */}
                            <div className="bg-white dark:bg-darkCard p-6 text-center shadow-sm mb-2 transition-colors">
                                <div className="text-gray-500 dark:text-darkTextSub text-sm mb-1">{t.personalExpense}</div>
                                <div className="text-4xl font-bold text-[#1f2937] dark:text-darkTextMain flex items-center justify-center gap-1">
                                    <span className="text-2xl">¥</span>{totalExpense.toFixed(2)}
                                </div>
                            </div>

                            {/* Trend Chart */}
                            <div className="bg-white dark:bg-darkCard p-4 shadow-sm mb-2 transition-colors">
                                <div className="flex items-center justify-between mb-4">
                                    <div className="flex items-center gap-2 font-bold text-lg dark:text-darkTextMain">
                                        {t.trend} <span className="text-xs font-normal bg-primary/10 text-primary px-2 py-1 rounded-full">{t.expense}</span>
                                    </div>
                                    <div className="flex items-center gap-2 text-xs">
                                        <div className="bg-gray-100 dark:bg-darkBg p-1 rounded-lg flex items-center">
                                            <button onClick={() => setTrendGroupBy('day')} className={`px-2 py-1 rounded-md transition-colors ${trendGroupBy === 'day' ? 'bg-white dark:bg-darkCard shadow-sm font-bold text-primary' : 'text-gray-500 dark:text-darkTextSub'}`}>{t.day}</button>
                                            <button onClick={() => setTrendGroupBy('month')} className={`px-2 py-1 rounded-md transition-colors ${trendGroupBy === 'month' ? 'bg-white dark:bg-darkCard shadow-sm font-bold text-primary' : 'text-gray-500 dark:text-darkTextSub'}`}>{t.month}</button>
                                            <button onClick={() => setTrendGroupBy('year')} className={`px-2 py-1 rounded-md transition-colors ${trendGroupBy === 'year' ? 'bg-white dark:bg-darkCard shadow-sm font-bold text-primary' : 'text-gray-500 dark:text-darkTextSub'}`}>{t.year}</button>
                                        </div>
                                        <div className="bg-gray-100 dark:bg-darkBg p-1 rounded-lg flex items-center">
                                            <button onClick={() => setTrendChartType('line')} className={`px-2 py-1 rounded-md transition-colors ${trendChartType === 'line' ? 'bg-white dark:bg-darkCard shadow-sm text-primary' : 'text-gray-500 dark:text-darkTextSub'}`}><i className="fa-solid fa-chart-line"></i></button>
                                            <button onClick={() => setTrendChartType('bar')} className={`px-2 py-1 rounded-md transition-colors ${trendChartType === 'bar' ? 'bg-white dark:bg-darkCard shadow-sm text-primary' : 'text-gray-500 dark:text-darkTextSub'}`}><i className="fa-solid fa-chart-column"></i></button>
                                        </div>
                                    </div>
                                </div>
                                <div ref={trendChartRef} className="w-full h-[200px]"></div>
                            </div>

                            {/* Category Chart */}
                            <div className="bg-white dark:bg-darkCard p-4 shadow-sm min-h-[400px] transition-colors">
                                <div className="flex items-center justify-between font-bold text-lg mb-2 dark:text-darkTextMain">
                                    <span>{t.expenseRatio}</span>
                                    <span className="text-sm font-normal text-gray-500 dark:text-darkTextSub">{t.total} ¥{totalExpense.toFixed(2)}</span>
                                </div>
                                
                                {/* ECharts Pie */}
                                <div ref={categoryChartRef} className="w-full h-[250px] mb-4"></div>

                                {/* Category List */}
                                <div className="space-y-3">
                                    <div className="text-sm text-gray-400 dark:text-darkTextSub mb-2 border-b border-gray-100 dark:border-darkBorder pb-2">{t.percentDesc}</div>
                                    {sortedCategories.length === 0 ? (
                                        <div className="text-center text-gray-400 dark:text-darkTextSub py-4">{t.noData}</div>
                                    ) : (
                                        sortedCategories.map((item, idx) => {
                                            const catObj = CATEGORIES.find(c => c.id === item.catId) || CATEGORIES[0];
                                            return (
                                                <div key={item.catId} className="flex items-center justify-between">
                                                    <div className="flex items-center gap-3">
                                                        <div className={`w-8 h-8 rounded-full flex items-center justify-center text-sm ${catObj.color} dark:opacity-90`}>
                                                            <i className={`fa-solid ${catObj.icon}`}></i>
                                                        </div>
                                                        <div>
                                                            <div className="text-sm font-bold text-textMain dark:text-darkTextMain">{language === 'zh' ? catObj.name : catObj.en_name}</div>
                                                            <div className="text-xs text-textSub dark:text-darkTextSub">{item.percent}%</div>
                                                        </div>
                                                    </div>
                                                    <div className="font-bold text-textMain dark:text-darkTextMain">¥{item.amount.toFixed(2)}</div>
                                                </div>
                                            );
                                        })
                                    )}
                                </div>
                            </div>
                        </div>
                    </div>
                );
            }

            // --- Screen: Dashboard (Tabs) ---
            if (activeScreen === 'dashboard') {
                return (
                    <div className="flex flex-col h-[100dvh] w-full bg-[#f9f9f9] dark:bg-darkBg animate-fade-in relative overflow-hidden transition-colors">
                        {/* Tab: Home (Groups) */}
                        {currentTab === 'home' && (
                            <div className="flex-1 overflow-y-auto pb-safe">
                                <div className="glass-header sticky top-0 z-10 px-5 pt-safe pb-3">
                                    <div className="flex items-center justify-between mt-4">
                                        <h1 className="text-2xl font-bold text-textMain dark:text-darkTextMain">{t.msg}</h1>
                                        <div className="flex gap-2 text-textMain text-sm font-bold">
                                            <button onClick={() => { setHideWelcomeGuide(false); setGuideStep(0); }} className="bg-gray-100 dark:bg-darkCard dark:text-darkTextMain px-3 py-1.5 rounded-full flex items-center gap-1.5 active:scale-90 transition-transform"><i className="fa-solid fa-lightbulb text-amber-500"></i> {t.guide}</button>
                                            <button onClick={() => setShowScannerModal(true)} className="bg-gray-100 dark:bg-darkCard dark:text-darkTextMain px-3 py-1.5 rounded-full flex items-center gap-1.5 active:scale-90 transition-transform"><i className="fa-solid fa-qrcode text-gray-500"></i> {t.scan}</button>
                                            <button onClick={() => setShowCreateGroup(true)} className="bg-primary/10 text-primary px-3 py-1.5 rounded-full flex items-center gap-1.5 active:scale-90 transition-transform"><i className="fa-solid fa-circle-plus"></i> {t.create}</button>
                                        </div>
                                    </div>
                                </div>
                                
                                <div className="p-4 space-y-4">
                                    {/* Search Bar */}
                                    <div className="bg-white dark:bg-darkCard rounded-xl px-4 py-3 flex items-center gap-3 card-shadow">
                                        <i className="fa-solid fa-magnifying-glass text-gray-400"></i>
                                        <input 
                                            type="text" 
                                            placeholder={t.searchGroup} 
                                            value={searchGroupQuery}
                                            onChange={e => setSearchGroupQuery(e.target.value)}
                                            className="bg-transparent dark:text-darkTextMain border-none outline-none w-full text-sm font-medium" 
                                        />
                                    </div>

                                    {/* Welcome Guide Carousel (Persistent until dismissed) */}
                                    {!hideWelcomeGuide && (
                                        <div className="bg-white dark:bg-darkCard rounded-2xl p-0 card-shadow relative overflow-hidden">
                                            <button onClick={() => setHideWelcomeGuide(true)} className="absolute top-4 right-4 z-20 text-gray-300 hover:text-gray-500 w-8 h-8 flex items-center justify-center bg-gray-50 dark:bg-darkBorder rounded-full active:scale-90 transition-transform">
                                                <i className="fa-solid fa-xmark"></i>
                                            </button>
                                            
                                            <div 
                                                className="flex transition-transform duration-300 ease-in-out"
                                                style={{ transform: `translateX(-${guideStep * 100}%)` }}
                                            >
                                                {/* Slide 0: Add Friends */}
                                                <div className="w-full flex-shrink-0 p-5 py-6 flex flex-col items-center justify-center text-center">
                                                    <div className="w-16 h-16 bg-blue-100 text-blue-500 rounded-full flex items-center justify-center text-3xl mb-4 shadow-sm"><i className="fa-solid fa-user-group"></i></div>
                                                    <h3 className="font-bold text-xl dark:text-darkTextMain mb-2">1. {language === 'zh' ? '建立联系' : 'Connect'}</h3>
                                                    <p className="text-textSub text-sm leading-relaxed px-2">{language === 'zh' ? '在“通讯录”页通过搜索昵称/ID或扫描专属二维码，快速添加您的同行好友或室友。' : 'Search by name/ID or scan QR codes in the Discover tab to quickly add your friends.'}</p>
                                                </div>

                                                    const num = parseFloat(amount);
                                                    if (currency === defaultCurrency) {
                                                        if (isNaN(num) || num === 0) return language === 'zh' ? `默认货币 (${defaultCurrency})` : `Default Currency (${defaultCurrency})`;

                                                    if (!rate) return language === 'zh' ? `自动按实时汇率转为默认货币 ${defaultCurrency}` : `Auto convert to default ${defaultCurrency}`;
