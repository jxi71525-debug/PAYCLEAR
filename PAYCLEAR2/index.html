                                        <div className="flex bg-white dark:bg-darkCard rounded-lg p-1 shadow-sm mb-3">
                                            <button onClick={() => { setSplitType('equal'); setSplitAmounts({}); setActiveInput('total'); setShowKeyboard(false); }} className={`flex-1 py-1.5 text-xs font-bold rounded-md transition-colors ${splitType === 'equal' ? 'bg-primary text-white' : 'text-textSub dark:text-darkTextSub'}`}>{t.splitEqual}</button>
                                            <button onClick={() => { if(splitType !== 'exact') { setSplitType('exact'); setSplitAmounts({}); setActiveInput('total'); setShowKeyboard(false); } }} className={`flex-1 py-1.5 text-xs font-bold rounded-md transition-colors ${splitType === 'exact' ? 'bg-primary text-white' : 'text-textSub dark:text-darkTextSub'}`}>{t.splitExact}</button>
                                            <button onClick={() => { if(splitType !== 'percent') { setSplitType('percent'); setSplitAmounts({}); setActiveInput('total'); setShowKeyboard(false); } }} className={`flex-1 py-1.5 text-xs font-bold rounded-md transition-colors ${splitType === 'percent' ? 'bg-primary text-white' : 'text-textSub dark:text-darkTextSub'}`}>{t.splitPercent}</button>
                                        </div>
                                        
                                        {splitType !== 'equal' && (
                                            <div className="space-y-2 max-h-[150px] overflow-y-auto">
                                                {participants.map(pid => {
                                                    const m = groupMembers.find(g => g.id === pid);
                                                    if (!m) return null;
                                                    return (
                                                        <div key={pid} className="flex items-center justify-between text-sm bg-white dark:bg-darkCard p-2 rounded-lg">
                                                            <div className="flex items-center gap-2">
                                                                <div className="w-5 h-5 bg-gray-200 dark:bg-darkBorder rounded-full flex items-center justify-center text-[10px] font-bold text-gray-600 dark:text-gray-400">{m.name.charAt(0)}</div>
                                                                <span className="font-medium dark:text-darkTextMain">{m.name}</span>
                                                            </div>
                                                            <div className="flex items-center gap-1">
                                                                <div 
                                                                    id={`split-input-${pid}`}
                                                                    className={`w-16 text-right bg-gray-50 dark:bg-darkBg dark:text-darkTextMain border rounded px-2 py-1 text-xs cursor-pointer truncate ${activeInput === pid && showKeyboard ? 'border-primary dark:border-primary text-primary dark:text-primary font-bold' : 'border-gray-200 dark:border-darkBorder'}`}
                                                                    onClick={(e) => { 
                                                                        e.stopPropagation(); 
                                                                        setActiveInput(pid); 
                                                                        setShowKeyboard(true); 
                                                                        setTimeout(() => {
                                                                            const el = document.getElementById(`split-input-${pid}`);
                                                                            if (el) el.scrollIntoView({ behavior: 'smooth', block: 'center' });
                                                                        }, 100);
                                                                    }}
                                                                >
                                                                    {splitAmounts[pid] || '0'}
                                                                </div>
                                                                <span className="text-xs text-textSub dark:text-darkTextSub font-bold min-w-[20px] shrink-0 text-left">{splitType === 'exact' ? currency : '%'}</span>
                                                            </div>
                                                        </div>
                                                    )
                                                })}
                                            </div>
                                        )}
                                    </div>
                                </div>
                            </div>

                            {/* Keyboard */}
                            {showKeyboard && (
                                <div className="bg-white dark:bg-darkCard shadow-top pb-safe animate-fade-in z-20">
                                    <div className="grid grid-cols-4 border-t border-gray-100 dark:border-darkBorder">
                                        <button className="calc-btn dark:text-darkTextMain py-4 text-2xl font-medium border-r border-b border-gray-100 dark:border-darkBorder active:bg-gray-100 dark:active:bg-darkBorder" onClick={() => handleCalcInput('7')}>7</button>
                                        <button className="calc-btn dark:text-darkTextMain py-4 text-2xl font-medium border-r border-b border-gray-100 dark:border-darkBorder active:bg-gray-100 dark:active:bg-darkBorder" onClick={() => handleCalcInput('8')}>8</button>
                                        <button className="calc-btn dark:text-darkTextMain py-4 text-2xl font-medium border-r border-b border-gray-100 dark:border-darkBorder active:bg-gray-100 dark:active:bg-darkBorder" onClick={() => handleCalcInput('9')}>9</button>
                                        <button className="calc-btn py-4 text-xl text-textSub dark:text-darkTextSub border-b border-gray-100 dark:border-darkBorder flex items-center justify-center active:bg-gray-100 dark:active:bg-darkBorder" onClick={handleDeleteCalc}><i className="fa-solid fa-delete-left"></i></button>
                                        
                                        <button className="calc-btn dark:text-darkTextMain py-4 text-2xl font-medium border-r border-b border-gray-100 dark:border-darkBorder active:bg-gray-100 dark:active:bg-darkBorder" onClick={() => handleCalcInput('4')}>4</button>
                                        <button className="calc-btn dark:text-darkTextMain py-4 text-2xl font-medium border-r border-b border-gray-100 dark:border-darkBorder active:bg-gray-100 dark:active:bg-darkBorder" onClick={() => handleCalcInput('5')}>5</button>
                                        <button className="calc-btn dark:text-darkTextMain py-4 text-2xl font-medium border-r border-b border-gray-100 dark:border-darkBorder active:bg-gray-100 dark:active:bg-darkBorder" onClick={() => handleCalcInput('6')}>6</button>
                                        <button className="calc-btn py-4 text-xl text-textSub dark:text-darkTextSub border-b border-gray-100 dark:border-darkBorder active:bg-gray-100 dark:active:bg-darkBorder" onClick={() => handleCalcInput('+')}>+</button>
                                        
                                        <button className="calc-btn dark:text-darkTextMain py-4 text-2xl font-medium border-r border-b border-gray-100 dark:border-darkBorder active:bg-gray-100 dark:active:bg-darkBorder" onClick={() => handleCalcInput('1')}>1</button>
                                        <button className="calc-btn dark:text-darkTextMain py-4 text-2xl font-medium border-r border-b border-gray-100 dark:border-darkBorder active:bg-gray-100 dark:active:bg-darkBorder" onClick={() => handleCalcInput('2')}>2</button>
                                        <button className="calc-btn dark:text-darkTextMain py-4 text-2xl font-medium border-r border-b border-gray-100 dark:border-darkBorder active:bg-gray-100 dark:active:bg-darkBorder" onClick={() => handleCalcInput('3')}>3</button>
                                        <button className={`calc-btn-primary row-span-2 bg-primary text-white font-bold text-xl flex flex-col items-center justify-center active:bg-primaryDark`} onClick={() => {
                                            if (activeInput === 'total') {
                                                if (amount.includes('+') || amount.includes('-')) {
                                                    try {
                                                        const result = eval(amount);
                                                        setAmount(Number(result).toFixed(2).replace(/\.00$/, ''));
                                                    } catch (e) { setAmount('0'); }
                                                } else {
                                                    setAmount(Number(amount).toString());
                                                    setShowKeyboard(false);
                                                }
                                            } else {
                                                const currentVal = splitAmounts[activeInput] || '0';
                                                if (currentVal.includes('+') || currentVal.includes('-')) {
                                                    try {
                                                        const result = eval(currentVal);
                                                        const numResult = Number(result);
                                                        
                                                        // validation
                                                        let sum = numResult;
                                                        Object.keys(splitAmounts).forEach(k => {
                                                            if (k !== activeInput) sum += parseFloat(splitAmounts[k]) || 0;
                                                        });
                                                        
                                                        if (splitType === 'exact' && sum > (parseFloat(amount) || 0)) {
                                                            showToast(language === 'zh' ? '已超过总金额！' : 'Exceeds total amount!', 'error');
                                                            return;
                                                        } else if (splitType === 'percent' && sum > 100) {
                                                            showToast(language === 'zh' ? '总比例不能超过100%！' : 'Total percentage cannot exceed 100%!', 'error');
                                                            return;
                                                        }

                                                        setSplitAmounts(prev => ({...prev, [activeInput]: numResult.toFixed(2).replace(/\.00$/, '')}));
                                                    } catch (e) {
                                                        setSplitAmounts(prev => ({...prev, [activeInput]: '0'}));
                                                    }
                                                } else {
                                                    setSplitAmounts(prev => ({...prev, [activeInput]: Number(currentVal).toString()}));
                                                    setShowKeyboard(false);
                                                }
                                            }
                                        }}>
                                            {(() => {
                                                const currentVal = activeInput === 'total' ? amount : (splitAmounts[activeInput] || '0');
                                                return currentVal.includes('+') || currentVal.includes('-') ? '=' : t.confirm;
                                            })()}
                                        </button>
                                        
                                        <button className="calc-btn py-4 text-xl text-textSub dark:text-darkTextSub border-r border-gray-100 dark:border-darkBorder active:bg-gray-100 dark:active:bg-darkBorder" onClick={() => handleCalcInput('-')}>-</button>
                                        <button className="calc-btn dark:text-darkTextMain py-4 text-2xl font-medium border-r border-gray-100 dark:border-darkBorder active:bg-gray-100 dark:active:bg-darkBorder" onClick={() => handleCalcInput('0')}>0</button>
                                        <button className="calc-btn dark:text-darkTextMain py-4 text-2xl font-medium border-r border-gray-100 dark:border-darkBorder active:bg-gray-100 dark:active:bg-darkBorder" onClick={() => handleCalcInput('.')}>.</button>
                                    </div>
                                </div>
                            )}

                            {/* Currency Selection Modal */}
                            {showCurrencyModal && (
                                <div className="fixed inset-0 bg-black/60 backdrop-blur-sm flex items-end sm:items-center justify-center z-[70] animate-fade-in" onClick={() => setShowCurrencyModal(false)}>
                                    <div className="bg-white dark:bg-darkCard w-full sm:w-80 rounded-t-2xl sm:rounded-2xl flex flex-col max-h-[80vh] shadow-xl pb-safe" onClick={e => e.stopPropagation()}>
                                        <div className="flex justify-between items-center p-4 border-b border-gray-100 dark:border-darkBorder shrink-0">
                                            <span className="font-bold text-textMain dark:text-darkTextMain">{t.selectCurrency}</span>
                                            <button onClick={() => setShowCurrencyModal(false)} className="w-8 h-8 flex items-center justify-center text-textSub dark:text-darkTextSub hover:bg-gray-100 dark:hover:bg-darkBg rounded-full transition-colors">
                                                <i className="fa-solid fa-xmark text-lg"></i>
                                            </button>
                                        </div>
                                        <div className="text-center text-xs text-textSub dark:text-darkTextSub py-2 bg-gray-50/50 dark:bg-darkBg flex items-center justify-center gap-1">
                                            {language === 'zh' ? '实时汇率由互联网数据服务商提供，点击' : 'Live rates provided by internet service, tap'}
                                            <i className="fa-solid fa-pen text-[10px] text-primary"></i>
                                            {language === 'zh' ? '可进行编辑' : 'to edit'}
                                        </div>
                                        <div className="p-3 shrink-0">
                                            <div className="bg-secondary dark:bg-darkBg rounded-xl flex items-center px-3 py-2">
                                                <i className="fa-solid fa-magnifying-glass text-gray-400 mr-2"></i>
                                                <input 
                                                    type="text" 
                                                    placeholder={t.searchCurrency} 
                                                    value={currencySearch}
                                                    onChange={e => setCurrencySearch(e.target.value)}
                                                    className="bg-transparent outline-none flex-1 text-sm dark:text-darkTextMain"
                                                />
                                            </div>
                                        </div>
                                        <div className="flex-1 overflow-y-auto px-2 pb-2">
                                            <div className="px-2 py-1 text-xs text-textSub dark:text-darkTextSub bg-transparent">{t.commonCurrencies}</div>
                                            {CURRENCY_DETAILS.filter(c => c.code.toLowerCase().includes(currencySearch.toLowerCase()) || c.name.includes(currencySearch)).map(c => {
                                                const isMain = c.code === defaultCurrency;
                                                const rate = isMain ? 1 : (liveRates[c.code] || 0);
                                                const rateStr = rate ? Number(rate).toFixed(5) : '...';
                                                const isSelected = currency === c.code;
                                                
                                                return (
                                                    <div 
                                                        key={c.code} 
                                                        className={`flex items-center justify-between p-3 rounded-xl cursor-pointer transition-colors mb-1 ${isSelected ? 'bg-red-50 dark:bg-red-900/20' : 'hover:bg-gray-50 dark:hover:bg-darkBg active:bg-gray-100 dark:active:bg-darkBg'}`}
                                                        onClick={() => { setCurrency(c.code); setShowCurrencyModal(false); }}
                                                    >
                                                        <div className="flex items-center gap-3">
                                                            <div className="w-8 h-auto shadow-sm rounded-sm overflow-hidden flex items-center justify-center shrink-0">
                                                                <img src={`https://flagcdn.com/w40/${c.countryCode}.png`} alt={c.code} className="w-full h-auto object-cover" />
                                                            </div>
                                                            <div className="flex flex-col">
                                                                <span className={`font-bold ${isSelected ? 'text-primary' : 'text-textMain dark:text-darkTextMain'}`}>{c.code} <span className="font-normal text-xs ml-1">{CURRENCY_SYMBOLS[c.code] || ''}</span></span>
                                                                <span className="text-xs text-textSub dark:text-darkTextSub truncate">{c.name}</span>
                                                            </div>
                                                        </div>
                                                        <div className="flex items-center gap-3">
                                                            <div className="text-right text-[10px] text-textSub dark:text-darkTextSub bg-gray-100/50 dark:bg-darkBorder px-2 py-1 rounded-md cursor-pointer hover:bg-gray-200 dark:hover:bg-gray-700 transition-colors" onClick={(e) => {
                                                                e.stopPropagation();
                                                                if (!isMain) {
                                                                    const newRate = prompt(language === 'zh' ? `编辑汇率 (1 ${c.code} = ? ${defaultCurrency})` : `Edit rate (1 ${c.code} = ? ${defaultCurrency})`, rateStr);
                                                                    if (newRate && !isNaN(parseFloat(newRate))) {
                                                                        setLiveRates(prev => ({...prev, [c.code]: parseFloat(newRate)}));
                                                                    }
                                                                }
                                                            }}>
                                                                {isMain ? (language === 'zh' ? '默认货币' : 'Default') : `1 ${c.code}=${rateStr} ${defaultCurrency}`}
                                                            </div>
                                                            {isSelected && <i className="fa-solid fa-check text-primary"></i>}
                                                        </div>
                                                    </div>
                                                );
                                            })}
                                        </div>
                                    </div>
                                </div>
                            )}

                            {/* Currency Selection Modal */}
                            {showCurrencyModal && (
                                <div className="fixed inset-0 bg-black/60 backdrop-blur-sm flex flex-col justify-end z-[60] animate-fade-in" onClick={() => setShowCurrencyModal(false)}>
                                    <div className="bg-white dark:bg-darkCard w-full rounded-t-3xl flex flex-col max-h-[85vh]" onClick={e => e.stopPropagation()}>
                                        {/* Header */}
                                        <div className="flex justify-between items-center p-4 border-b border-gray-100 dark:border-darkBorder shrink-0">
                                            <div className="w-8"></div>
                                            <h3 className="text-lg font-bold dark:text-darkTextMain">{t.selectCurrency}</h3>
                                            <button onClick={() => setShowCurrencyModal(false)} className="w-8 h-8 text-gray-400 hover:text-textMain dark:hover:text-darkTextMain flex items-center justify-center">
                                                <i className="fa-solid fa-xmark text-xl"></i>
                                            </button>
                                        </div>
                                        
                                        {/* Subtitle */}
                                        <div className="text-center text-xs text-textSub dark:text-darkTextSub py-2 bg-gray-50/50 dark:bg-darkBg flex items-center justify-center gap-1">
                                            {language === 'zh' ? '实时汇率由互联网数据服务商提供，点击' : 'Live rates provided by internet service, tap'}
                                            <i className="fa-solid fa-pen text-[10px] text-primary"></i>
                                            {language === 'zh' ? '可进行编辑' : 'to edit'}
                                        </div>
                                        
                                        {/* Search */}
                                        <div className="p-3 shrink-0">
                                            <div className="bg-secondary dark:bg-darkBg rounded-xl flex items-center px-3 py-2">
                                                <i className="fa-solid fa-magnifying-glass text-gray-400 mr-2"></i>
                                                <input 
                                                    type="text" 
                                                    placeholder={t.searchCurrency} 
                                                    value={currencySearch}
                                                    onChange={e => setCurrencySearch(e.target.value)}
                                                    className="bg-transparent outline-none flex-1 text-sm dark:text-darkTextMain"
                                                />
                                            </div>
                                        </div>
                                        
                                        {/* List */}
                                        <div className="flex-1 overflow-y-auto pb-safe">
                                            <div className="px-4 py-1 text-xs text-textSub dark:text-darkTextSub bg-gray-50 dark:bg-darkBg">{t.commonCurrencies}</div>
                                            <div className="divide-y divide-gray-50 dark:divide-darkBorder">
                                                {CURRENCY_DETAILS.filter(c => c.code.toLowerCase().includes(currencySearch.toLowerCase()) || c.name.includes(currencySearch)).map(c => {
                                                    const isMain = c.code === currentGroup.main_currency;
                                                    const rate = isMain ? 1 : (liveRates[c.code] || 0);
                                                    const rateStr = rate ? Number(rate).toFixed(5) : '...';
                                                    const isSelected = currency === c.code;
                                                    
                                                    return (
                                                        <div key={c.code} className="flex items-center justify-between p-4 active:bg-gray-50 dark:active:bg-darkBorder transition-colors cursor-pointer" onClick={() => { setCurrency(c.code); setShowCurrencyModal(false); }}>
                                                            <div className="flex items-center gap-4">
                                                                <div className="w-8 h-auto shadow-sm rounded-sm overflow-hidden flex items-center justify-center">
                                                                    <img src={`https://flagcdn.com/w40/${c.countryCode}.png`} alt={c.code} className="w-full h-auto object-cover" />
                                                                </div>
                                                                <div>
                                                                    <div className="font-bold text-textMain dark:text-darkTextMain text-sm">{c.code}-{c.name}</div>
                                                                    <div className="text-xs text-textSub dark:text-darkTextSub mt-0.5 flex items-center gap-1">
                                                                        1 {c.code}={rateStr} {currentGroup.main_currency}
                                                                        {!isMain && <i className="fa-solid fa-pen text-[10px] text-primary ml-1" onClick={(e) => {
                                                                            e.stopPropagation();
                                                                            const newRate = prompt(language === 'zh' ? `编辑汇率 (1 ${c.code} = ? ${currentGroup.main_currency})` : `Edit rate (1 ${c.code} = ? ${currentGroup.main_currency})`, rateStr);
                                                                            if (newRate && !isNaN(newRate)) {
                                                                                setLiveRates({...liveRates, [c.code]: parseFloat(newRate)});
                                                                            }
                                                                        }}></i>}
                                                                    </div>
                                                                </div>
                                                            </div>
                                                            {isSelected && (
                                                                <div className="w-6 h-6 rounded-full bg-primary text-white flex items-center justify-center">
                                                                    <i className="fa-solid fa-check text-xs"></i>
                                                                </div>
                                                            )}
                                                        </div>
                                                    )
                                                })}
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            )}
                        </div>
                    );
                }

                // Group List View -> Replaced with Chat View
                return (
                    <div className="flex flex-col h-[100dvh] bg-[#f4f5f7] dark:bg-darkBg animate-fade-in relative overflow-hidden transition-colors">
                        {/* Header */}
                        <div className="glass-header px-5 pt-safe pb-3 sticky top-0 z-20 flex items-center justify-between">
                            <div className="flex items-center gap-3">
                                <button onClick={() => { setActiveScreen('dashboard'); setCurrentTab('home'); }} className="w-10 h-10 flex items-center justify-center -ml-2 text-textMain dark:text-darkTextMain active:scale-90 transition-transform">
                                    <i className="fa-solid fa-angle-left text-2xl"></i>
                                </button>
                                <div>
                                    <h2 className="text-xl font-bold text-textMain dark:text-darkTextMain">{currentGroup.name} <span className="text-sm font-normal text-textSub dark:text-darkTextSub">({groupMembers.length})</span></h2>
                                </div>
                            </div>
                            <div className="flex items-center gap-3">
                                <button onClick={() => { setQrData({ type: 'group', id: currentGroup.id }); setShowQRModal(true); }} className="w-8 h-8 flex items-center justify-center text-textMain dark:text-darkTextMain active:scale-90 transition-transform"><i className="fa-solid fa-qrcode text-lg"></i></button>
                                <button onClick={handleSettleUp} className="flex items-center gap-1.5 px-3 py-1.5 bg-primary/10 text-primary rounded-full font-bold text-sm active:scale-90 transition-transform">
                                    <i className="fa-solid fa-file-invoice-dollar text-lg"></i>
                                    {t.settle}
                                </button>
                            </div>
                        </div>

                        {/* Chat Messages Area */}
                        {/* Smart Suggestion Overlay */}
                        {smartSuggestion && (
                            <div className="bg-white dark:bg-darkCard mx-4 mt-4 p-4 rounded-2xl shadow-float flex items-center justify-between animate-fade-in z-20">
                                <div>
                                    <p className="text-xs text-textSub dark:text-darkTextSub mb-1">{t.smartDetect}</p>
                                    <p className="font-bold text-textMain dark:text-darkTextMain">{t.recordOne} {smartSuggestion.amount}?</p>
                                </div>
                                <div className="flex gap-2">
                                    <button onClick={() => setSmartSuggestion(null)} className="w-8 h-8 rounded-full bg-gray-100 dark:bg-darkBorder text-gray-500 flex items-center justify-center"><i className="fa-solid fa-xmark"></i></button>
                                    <button onClick={handleAcceptSmartSuggestion} className="w-8 h-8 rounded-full bg-primary text-white flex items-center justify-center"><i className="fa-solid fa-check"></i></button>
                                </div>
                            </div>
                        )}

                        {/* Chat Feed */}
                        <div className="flex-1 overflow-y-auto p-4 space-y-4 pb-20" ref={chatScrollRef}>
                            {feed.length === 0 && (
                                <div className="text-center text-textSub dark:text-darkTextSub mt-10 text-sm">
                                    {t.noChatYet}
                                </div>
                            )}
                            {feed.map(item => {
                                const sender = groupMembers.find(m => m.id === (item._type === 'message' ? item.user_id : item.payer_id));
                                const senderName = sender ? sender.name : 'Unknown';
                                const isMe = sender && sender.id === currentUser.id;

                                if (item._type === 'bill') {
                                    // Bill Card (rendered in center)
                                    const cat = CATEGORIES.find(c => c.id === item.category) || CATEGORIES[0];
                                    return (
                                        <div key={`bill-${item.id}`} className="flex justify-center my-4 animate-fade-in">
                                            <div 
                                                className="bg-white dark:bg-darkCard rounded-2xl shadow-soft w-[85%] overflow-hidden cursor-pointer active:scale-95 transition-transform relative group"
                                                onClick={() => handleEditBill(item)}
                                            >
                                                <div className={`${cat.color.split(' ')[0]} dark:opacity-90 p-3 flex items-center gap-3`}>
                                                    <div className="w-8 h-8 bg-white/50 rounded-full flex items-center justify-center text-current"><i className={`fa-solid ${cat.icon}`}></i></div>
                                                    <span className="font-bold text-current">{language === 'zh' ? cat.name : cat.en_name}</span>
                                                    <span className="ml-auto font-bold text-current">{item.original_currency !== currentGroup.main_currency ? item.original_currency : ''} {item.original_amount}</span>
                                                </div>
                                                <div className="p-3 bg-white dark:bg-darkCard text-xs text-textSub dark:text-darkTextSub flex justify-between items-center">
                                                    <span>{senderName} {t.paid}</span>
                                                    <span>{getBillParticipantIds(item).length} {t.participants}</span>
                                                </div>
                                                {/* Edit hint overlay */}
                                                <div className="absolute inset-0 bg-black/5 opacity-0 group-hover:opacity-100 flex items-center justify-center transition-opacity">
                                                    <div className="bg-white/90 dark:bg-darkCard/90 text-textMain dark:text-darkTextMain px-3 py-1 rounded-full text-xs font-bold shadow-sm">{t.editBill}</div>
                                                </div>
                                            </div>
                                        </div>
                                    );
                                } else {
                                    // Chat Message Bubble
                                    const parsedExpense = parseExpenseText(item.content);
                                    
                                    return (
                                        <div key={`msg-${item.id}`} className={`flex gap-3 animate-fade-in ${isMe ? 'flex-row-reverse' : 'flex-row'}`}>
                                            <div className="w-10 h-10 rounded-xl bg-gradient-to-br from-gray-300 to-gray-400 text-white flex items-center justify-center font-bold shrink-0 shadow-sm">
                                                {senderName.charAt(0).toUpperCase()}
                                            </div>
                                            <div className={`flex flex-col ${isMe ? 'items-end' : 'items-start'}`}>
                                                <span className="text-[10px] text-textSub dark:text-darkTextSub mb-1 px-1">{senderName}</span>
                                                <div className="relative group">
                                                    <div 
                                                        className={`p-3 rounded-2xl max-w-[240px] shadow-sm break-words ${parsedExpense ? 'cursor-pointer active:scale-95 transition-transform' : ''} ${isMe ? 'bg-primary text-white rounded-tr-none' : 'bg-white dark:bg-darkCard text-textMain dark:text-darkTextMain rounded-tl-none'}`}
                                                        onClick={() => parsedExpense && handleMessageClick(item.content, item.user_id)}
                                                    >
                                                        {item.content}
                                                    </div>
                                                    {/* Hint for parsable expense */}
                                                    {parsedExpense && (
                                                        <div className={`absolute -bottom-5 ${isMe ? 'right-2' : 'left-2'} text-[10px] text-orange-400 whitespace-nowrap flex items-center gap-1 font-medium`}>
                                                            <i className="fa-solid fa-hand-pointer animate-pulse"></i>
                                                            {t.recordOne} (¥{parsedExpense.amount})
                                                        </div>
                                                    )}
                                                </div>
                                                {parsedExpense && <div className="h-4"></div> /* Spacer for the absolute hint */}
                                            </div>
                                        </div>
                                    );
                                }
                            })}
                        </div>

                        {/* Floating Add Expense Button */}
                        <div className="absolute bottom-20 right-4 z-10">
                            <button onClick={openAddExpense} className="bg-primary text-white shadow-float rounded-full px-5 py-3 font-bold flex items-center gap-2 active:scale-95 transition-transform">
                                <i className="fa-solid fa-plus"></i> {t.recordOne}
                            </button>
                        </div>

                        {/* Bottom Input Bar */}
                        <div className="bg-[#f6f6f6] dark:bg-darkBg border-t border-gray-200 dark:border-darkBorder p-3 pb-safe flex items-end gap-2 shrink-0 z-20 relative">
                            <button onClick={openGameModal} className="w-10 h-10 rounded-full flex items-center justify-center text-gray-500 dark:text-gray-400 hover:text-orange-500 dark:hover:text-orange-400 shrink-0 bg-white dark:bg-darkCard shadow-sm border border-gray-200 dark:border-darkBorder">
                                <i className="fa-solid fa-gamepad text-xl"></i>
                            </button>
                            
                            <form onSubmit={handleSendChat} className="flex-1 flex gap-2">
                                <input 
                                    type="text" 
                                    value={chatInput}
                                    onChange={e => setChatInput(e.target.value)}
                                    className="flex-1 bg-white dark:bg-darkCard dark:text-darkTextMain rounded-full px-4 py-2.5 outline-none border border-gray-200 dark:border-darkBorder focus:border-primary dark:focus:border-primary transition-colors"
                                    placeholder={t.typeMessage}
                                />
                                <button type="submit" disabled={!chatInput.trim()} className={`w-10 h-10 rounded-full flex items-center justify-center shrink-0 shadow-sm transition-colors ${chatInput.trim() ? 'bg-primary text-white' : 'bg-gray-200 dark:bg-darkBorder text-gray-400 dark:text-gray-500'}`}>
                                    <i className="fa-solid fa-paper-plane"></i>
                                </button>
                            </form>
                        </div>

                        {/* Modals... */}
                        {showGameModal && (
                            <div className="fixed inset-0 bg-black/60 backdrop-blur-sm flex items-center justify-center z-50 animate-fade-in" onClick={() => gameStatus !== 'playing' && setShowGameModal(false)}>
                                <div className="bg-white dark:bg-darkCard rounded-3xl p-6 max-w-sm w-full mx-4 shadow-2xl relative" onClick={e => e.stopPropagation()}>
                                    {/* Header */}
                                    {gameMode === 'select' ? (
                                        <div className="flex justify-between items-center mb-6">
                                            <h3 className="text-xl font-bold dark:text-darkTextMain">{t.whoPays} 🎮</h3>
                                            <button onClick={() => setShowGameModal(false)} className="text-gray-400 hover:text-textMain dark:hover:text-darkTextMain"><i className="fa-solid fa-xmark text-xl"></i></button>
                                        </div>
                                    ) : (
                                        <div className="flex justify-between items-center mb-6">
                                            <button onClick={() => { setGameMode('select'); setGameStatus('idle'); setGameWinner(null); }} className="text-gray-400 hover:text-textMain dark:hover:text-darkTextMain" disabled={gameStatus === 'playing'}><i className="fa-solid fa-angle-left text-xl"></i></button>
                                            <h3 className="text-lg font-bold dark:text-darkTextMain">
                                                {gameMode === 'roulette' ? t.gameRoulette : gameMode === 'cards' ? t.gameCards : t.gameDice}
                                            </h3>
                                            <div className="w-5"></div>
                                        </div>
                                    )}

                                    {/* SELECT MODE */}
                                    {gameMode === 'select' && (
                                        <div className="space-y-4">
                                            <button onClick={() => { setGameMode('roulette'); setGameStatus('idle'); setGameWinner(null); }} className="w-full bg-orange-50 p-4 rounded-2xl flex items-center gap-4 active:scale-95 transition-transform">
                                                <div className="w-12 h-12 bg-orange-100 text-orange-500 rounded-full flex items-center justify-center text-2xl">🎡</div>
                                                <div className="text-left"><div className="font-bold text-textMain">{t.gameRoulette}</div><div className="text-xs text-textSub">{language === 'zh' ? '快速随机抽取一名幸运儿' : 'Randomly pick one lucky person'}</div></div>
                                            </button>
                                            <button onClick={() => { setGameMode('cards'); initCards(); }} className="w-full bg-rose-50 p-4 rounded-2xl flex items-center gap-4 active:scale-95 transition-transform">
                                                <div className="w-12 h-12 bg-rose-100 text-rose-500 rounded-full flex items-center justify-center text-2xl">💣</div>
                                                <div className="text-left"><div className="font-bold text-textMain">{t.gameCards}</div><div className="text-xs text-textSub">{language === 'zh' ? '轮流翻牌，翻到炸弹买单' : 'Pick cards, bomb pays'}</div></div>
                                            </button>
                                            <button onClick={() => { setGameMode('dice'); initDice(); }} className="w-full bg-blue-50 p-4 rounded-2xl flex items-center gap-4 active:scale-95 transition-transform">
                                                <div className="w-12 h-12 bg-blue-100 text-blue-500 rounded-full flex items-center justify-center text-2xl">🎲</div>
                                                <div className="text-left"><div className="font-bold text-textMain">{t.gameDice}</div><div className="text-xs text-textSub">{language === 'zh' ? '全员掷骰子，点数最小者买单' : 'Roll dice, lowest pays'}</div></div>
                                            </button>
                                        </div>
                                    )}

                                    {/* ROULETTE MODE */}
                                    {gameMode === 'roulette' && (
                                        <div className="text-center">
                                            <div className="h-32 flex items-center justify-center mb-6">
                                                {gameWinner ? (
                                                    <div className="animate-fade-in flex flex-col items-center">
                                                        <div className={`w-20 h-20 rounded-full flex items-center justify-center text-3xl text-white font-bold mb-3 shadow-lg ${gameStatus === 'playing' ? 'bg-gray-400' : 'bg-orange-500 animate-bounce'}`}>
                                                            {gameWinner.name.charAt(0).toUpperCase()}
                                                        </div>
                                                        <span className={`text-xl font-bold ${gameStatus === 'playing' ? 'text-gray-500' : 'text-orange-500'}`}>{gameWinner.name}</span>
                                                        {gameStatus === 'done' && <span className="text-sm text-textSub mt-1">{language === 'zh' ? '就是你了！' : 'It\'s you!'}</span>}
                                                    </div>
                                                ) : (
                                                    <div className="w-20 h-20 rounded-full bg-gray-100 flex items-center justify-center text-4xl text-gray-300">?</div>
                                                )}
                                            </div>
                                            {gameStatus === 'done' ? (
                                                <div className="flex gap-3 mt-4">
                                                    <button onClick={initRoulette} className="flex-1 py-3 bg-secondary text-textMain font-bold rounded-xl active:scale-95">{language === 'zh' ? '再抽一次' : 'Spin Again'}</button>
                                                    <button onClick={handleGameSettle} className="flex-1 py-3 bg-orange-500 text-white font-bold rounded-xl shadow-float active:scale-95">{t.recordOne}</button>
                                                </div>
                                            ) : (
                                                <button onClick={initRoulette} disabled={gameStatus === 'playing'} className={`w-full py-4 rounded-xl font-bold text-white shadow-float transition-all ${gameStatus === 'playing' ? 'bg-gray-400 cursor-not-allowed' : 'bg-orange-500 active:scale-95'}`}>
                                                    {gameStatus === 'playing' ? (language === 'zh' ? '抽取中...' : 'Spinning...') : (language === 'zh' ? '开始抽取' : 'Start Spin')}
                                                </button>
                                            )}
                                        </div>
                                    )}

                                    {/* CARDS MODE */}
                                    {gameMode === 'cards' && gameData.members && (
                                        <div className="text-center">
                                            <div className="grid grid-cols-3 gap-3 mb-6 max-h-[300px] overflow-y-auto p-2">
                                                {gameData.members.map((m, idx) => {
                                                    const isFlipped = gameData.flipped.includes(idx);
                                                    const isBomb = idx === gameData.bombIdx;
                                                    return (
                                                        <div key={idx} onClick={() => handleCardClick(idx)} className="relative aspect-[3/4] w-full [perspective:1000px]">
                                                            <div className={`w-full h-full transition-transform duration-500 [transform-style:preserve-3d] ${isFlipped ? '[transform:rotateY(180deg)]' : 'cursor-pointer hover:scale-105 active:scale-95'}`}>
                                                                {/* Front (Hidden initially) */}
                                                                <div className="absolute inset-0 bg-rose-500 rounded-xl shadow-md flex items-center justify-center [backface-visibility:hidden]">
                                                                    <div className="text-white text-3xl font-bold">?</div>
                                                                </div>
                                                                {/* Back (Revealed) */}
                                                                <div className={`absolute inset-0 rounded-xl shadow-inner flex flex-col items-center justify-center [backface-visibility:hidden] [transform:rotateY(180deg)] ${isBomb ? 'bg-gray-900 text-white' : 'bg-green-50 text-green-600 border border-green-200'}`}>
                                                                    <div className="text-3xl mb-1">{isBomb ? '💣' : '✅'}</div>
                                                                    <div className="text-[10px] font-bold truncate w-full px-1">{m.name}</div>
                                                                </div>
                                                            </div>
                                                        </div>
                                                    )
                                                })}
                                            </div>
                                            {gameStatus === 'done' ? (
                                                <div className="animate-fade-in">
                                                    <p className="text-rose-500 font-bold mb-4 text-lg">💥 {language === 'zh' ? '炸弹爆炸！' : 'Bomb!'} {gameWinner?.name} {t.paid}！</p>
                                                    <div className="flex gap-3">
                                                        <button onClick={initCards} className="flex-1 py-3 bg-secondary text-textMain font-bold rounded-xl active:scale-95">{language === 'zh' ? '再玩一次' : 'Play Again'}</button>
                                                        <button onClick={handleGameSettle} className="flex-1 py-3 bg-rose-500 text-white font-bold rounded-xl shadow-float active:scale-95">{t.recordOne}</button>
                                                    </div>
                                                </div>
                                            ) : (
                                                <p className="text-textSub text-sm mb-2">{language === 'zh' ? '请大家依次点击翻牌...' : 'Take turns picking cards...'}</p>
                                            )}
                                        </div>
                                    )}

                                    {/* DICE MODE */}
                                    {gameMode === 'dice' && gameData.results && (
                                        <div className="text-center">
                                            <div className="grid grid-cols-2 gap-3 mb-6 max-h-[300px] overflow-y-auto p-2">
                                                {groupMembers.map(m => {
                                                    const score = gameData.results[m.id] || 1;
                                                    const isLoser = gameStatus === 'done' && gameData.losers?.includes(m.id);
                                                    return (
                                                        <div key={m.id} className={`p-3 rounded-xl flex items-center justify-between border-2 transition-all ${isLoser ? 'border-blue-500 bg-blue-50' : 'border-gray-100 bg-white'}`}>
                                                            <div className="text-xs font-bold truncate max-w-[60px] text-left">{m.name}</div>
                                                            <div className={`text-3xl leading-none ${gameData.rolling ? 'animate-bounce' : ''}`}>
                                                                {['','⚀','⚁','⚂','⚃','⚄','⚅'][score]}
                                                            </div>
                                                        </div>
                                                    )
                                                })}
                                            </div>
                                            {gameStatus === 'done' ? (
                                                <div className="animate-fade-in">
                                                    <p className="text-blue-500 font-bold mb-4 text-lg">😭 {language === 'zh' ? '点数最小！' : 'Lowest!'} {gameWinner?.name} {t.paid}！</p>
                                                    <div className="flex gap-3">
                                                        <button onClick={initDice} className="flex-1 py-3 bg-secondary text-textMain font-bold rounded-xl active:scale-95">{language === 'zh' ? '再掷一次' : 'Roll Again'}</button>
                                                        <button onClick={handleGameSettle} className="flex-1 py-3 bg-blue-500 text-white font-bold rounded-xl shadow-float active:scale-95">{t.recordOne}</button>
                                                    </div>
                                                </div>
                                            ) : (
                                                <button onClick={initDice} disabled={gameData.rolling} className={`w-full py-4 rounded-xl font-bold text-white shadow-float transition-all ${gameData.rolling ? 'bg-gray-400 cursor-not-allowed' : 'bg-blue-500 active:scale-95'}`}>
                                                    {gameData.rolling ? (language === 'zh' ? '掷骰子中...' : 'Rolling...') : (language === 'zh' ? '全员掷骰子' : 'Roll All Dice')}
                                                </button>
                                            )}
                                        </div>
                                    )}
                                </div>
                            </div>
                        )}

                        {showQRModal && (
                            <div className="fixed inset-0 bg-black/60 backdrop-blur-sm flex items-center justify-center p-4 z-50 animate-fade-in" onClick={() => setShowQRModal(false)}>
                                <div className="bg-white dark:bg-darkCard rounded-3xl p-8 max-w-[300px] w-full text-center shadow-2xl" onClick={e => e.stopPropagation()}>
                                    <div className="w-12 h-12 bg-primary/10 rounded-full flex items-center justify-center text-primary mx-auto mb-4">
                                        <i className="fa-solid fa-users text-xl"></i>
                                    </div>
                                    <h3 className="text-xl font-bold text-textMain dark:text-darkTextMain mb-1">{t.scanToJoinGroup}</h3>
                                    <p className="text-sm text-textSub dark:text-darkTextSub mb-6">{t.letFriendScan}</p>
                                    <div className="bg-secondary dark:bg-darkBg p-4 rounded-2xl flex justify-center mb-6">
                                        <div id="qrcode" ref={qrRef}></div>
                                    </div>
                                    <button onClick={() => setShowQRModal(false)} className="w-full py-3.5 bg-secondary dark:bg-darkBg text-textMain dark:text-darkTextMain font-bold rounded-xl active:scale-95">{t.close}</button>
                                </div>
                            </div>
                        )}

                        {/* Settle Up Modal */}
                        {showSettleModal && (() => {
                            const totalGroupExpense = bills.reduce((sum, b) => sum + b.amount, 0);
                            const categoryGroupMap = {};
                            bills.forEach(b => {
                                categoryGroupMap[b.category] = (categoryGroupMap[b.category] || 0) + b.amount;
                            });
                            const sortedGroupCategories = Object.keys(categoryGroupMap).map(catId => ({
                                catId, amount: categoryGroupMap[catId]
                            })).sort((a, b) => b.amount - a.amount);

                            return (
                                <div className="fixed inset-0 bg-black/60 backdrop-blur-sm flex items-end sm:items-center justify-center z-50 animate-fade-in" onClick={() => setShowSettleModal(false)}>
                                    <div className="bg-white dark:bg-darkCard w-full max-w-md rounded-t-3xl sm:rounded-3xl p-6 pb-safe shadow-2xl flex flex-col max-h-[90vh]" onClick={e => e.stopPropagation()}>
                                        <div className="flex justify-between items-center mb-6 shrink-0">
                                            <div className="flex items-center gap-2">
                                                <div className="w-8 h-8 rounded-full bg-primaryLight dark:bg-primary/20 text-primary flex items-center justify-center">
                                                    <i className="fa-solid fa-file-invoice-dollar"></i>
                                                </div>
                                                <h3 className="text-xl font-bold dark:text-darkTextMain">{t.settle}</h3>
                                            </div>
                                            <button onClick={() => setShowSettleModal(false)} className="text-gray-400 hover:text-textMain dark:hover:text-darkTextMain"><i className="fa-solid fa-xmark text-xl"></i></button>
                                        </div>
                                        
                                        <div className="overflow-y-auto pr-2 space-y-6 flex-1 pb-4">
                                            {/* 1. Overview */}
                                            <div>
                                                <div className="text-center mb-4">
                                                    <div className="text-sm text-textSub dark:text-darkTextSub mb-1">{t.totalGroupExpense}</div>
                                                    <div className="text-3xl font-bold text-textMain dark:text-darkTextMain"><span className="text-lg font-normal text-textSub dark:text-darkTextSub mr-1">{currentGroup.main_currency}</span>{totalGroupExpense.toFixed(2)}</div>
                                                </div>
                                                
                                                {sortedGroupCategories.length > 0 && (
                                                    <div className="flex overflow-x-auto gap-3 pb-2 no-scrollbar">
                                                        {sortedGroupCategories.map(catItem => {
                                                            const cat = CATEGORIES.find(c => c.id === catItem.catId) || CATEGORIES[0];
                                                            return (
                                                                <div key={cat.id} className="bg-secondary dark:bg-darkBg rounded-xl p-3 flex-shrink-0 min-w-[90px] flex flex-col items-center justify-center gap-1">
                                                                    <div className={`w-8 h-8 rounded-full flex items-center justify-center text-sm ${cat.color}`}><i className={`fa-solid ${cat.icon}`}></i></div>
                                                                    <div className="text-xs text-textSub dark:text-darkTextSub">{language === 'zh' ? cat.name : cat.en_name}</div>
                                                                    <div className="text-sm font-bold dark:text-darkTextMain">{catItem.amount.toFixed(2)}</div>
                                                                </div>
                                                            )
                                                        })}
                                                    </div>
                                                )}
                                            </div>

                                            {/* 2. Settlement Plan */}
                                            <div>
                                                <h4 className="font-bold text-md mb-3 flex items-center gap-2 dark:text-darkTextMain"><i className="fa-solid fa-money-bill-transfer text-primary"></i> {t.whoPaysWho}</h4>
                                                <div className="space-y-3">
                                                    {settlements.length === 0 ? (
                                                        <div className="text-center py-4 text-textSub dark:text-darkTextSub bg-secondary dark:bg-darkBg rounded-2xl">
                                                            <i className="fa-regular fa-face-smile text-2xl mb-2 text-gray-300 dark:text-gray-600 block"></i>
                                                            <p className="text-sm">{t.allSettled}</p>
                                                        </div>
                                                    ) : (
                                                        settlements.map((s, idx) => (
                                                            <div key={idx} className="bg-secondary dark:bg-darkBg p-4 rounded-2xl flex items-center justify-between shadow-sm border border-gray-100 dark:border-darkBorder">
                                                                <div className="flex items-center gap-3">
                                                                    <div className="font-bold text-textMain dark:text-darkTextMain">{s.from}</div>
                                                                    <div className="text-gray-300 dark:text-gray-600"><i className="fa-solid fa-arrow-right-long"></i></div>
                                                                    <div className="font-bold text-textMain dark:text-darkTextMain">{s.to}</div>
                                                                </div>
                                                                <div className="font-bold text-primary text-lg flex items-center gap-1">
                                                                    <span className="text-xs text-textMain dark:text-darkTextMain font-normal">{currentGroup.main_currency}</span> {s.amount}
                                                                </div>
                                                            </div>
                                                        ))
                                                    )}
                                                </div>
                                            </div>

                                            {/* 3. Bills List */}
                                            <div>
                                                <h4 className="font-bold text-md mb-3 flex items-center gap-2 dark:text-darkTextMain"><i className="fa-solid fa-list-ul text-primary"></i> {t.billDetails}</h4>
                                                <div className="space-y-2">
                                                    {bills.length === 0 ? (
                                                        <div className="text-center py-4 text-textSub dark:text-darkTextSub text-sm">{t.noDataLabel}</div>
                                                    ) : (
                                                        bills.map(b => {
                                                            const cat = CATEGORIES.find(c => c.id === b.category) || CATEGORIES[0];
                                                            const payer = groupMembers.find(m => m.id === b.payer_id);
                                                            return (
                                                                <div key={b.id} className="bg-white dark:bg-darkCard border border-gray-100 dark:border-darkBorder p-3 rounded-xl flex items-center justify-between shadow-sm">
                                                                    <div className="flex items-center gap-3">
                                                                        <div className={`w-8 h-8 rounded-full flex items-center justify-center text-xs ${cat.color} dark:opacity-90`}>
                                                                            <i className={`fa-solid ${cat.icon}`}></i>
                                                                        </div>
                                                                        <div>
                                                                            <div className="text-sm font-bold text-textMain dark:text-darkTextMain">{language === 'zh' ? cat.name : cat.en_name}</div>
                                                                            <div className="text-[10px] text-textSub dark:text-darkTextSub">{payer?.name || 'Unknown'} {t.paid} · {b.date}</div>
                                                                        </div>
                                                                    </div>
                                                                    <div className="font-bold text-sm text-textMain dark:text-darkTextMain">
                                                                        {b.amount.toFixed(2)}
                                                                    </div>
                                                                </div>
                                                            )
                                                        })
                                                    )}
                                                </div>
                                            </div>
                                        </div>
                                        
                                        <button onClick={() => setShowSettleModal(false)} className="w-full bg-primary text-white font-bold py-4 rounded-xl shadow-float active:scale-95 shrink-0 mt-2">{language === 'zh' ? '我知道了' : 'Got it'}</button>
                                    </div>
                                </div>
                            );
                        })()}
                    </div>
                );
            }

            return null;
        };

        return (
            <>
                {renderGlobalOverlays()}
                {renderScreen()}

                {/* Custom Logout Confirm Modal */}
                {showLogoutConfirm && (
                    <div className="fixed inset-0 bg-black/60 backdrop-blur-sm flex items-center justify-center z-[100] animate-fade-in p-4" onClick={() => setShowLogoutConfirm(false)}>
                        <div className="bg-white dark:bg-darkCard w-full max-w-[320px] rounded-3xl p-6 shadow-2xl relative text-center" onClick={e => e.stopPropagation()}>
                            <div className="w-16 h-16 bg-red-50 dark:bg-red-900/20 text-red-500 rounded-full flex items-center justify-center text-2xl mx-auto mb-4">
                                <i className="fa-solid fa-arrow-right-from-bracket"></i>
                            </div>
                            <h3 className="text-xl font-bold text-textMain dark:text-darkTextMain mb-2">{language === 'zh' ? '退出账号' : 'Log Out'}</h3>
                            <p className="text-sm text-textSub dark:text-darkTextSub mb-6">
                                {language === 'zh' ? '确定要退出当前账号吗？' : 'Are you sure you want to log out of your account?'}
                            </p>
                            <div className="flex gap-3">
                                <button onClick={() => setShowLogoutConfirm(false)} className="flex-1 bg-gray-100 dark:bg-darkBg text-textMain dark:text-darkTextMain font-bold py-3.5 rounded-xl active:scale-95 transition-transform">
                                    {language === 'zh' ? '取消' : 'Cancel'}
                                </button>
                                <button onClick={handleLogout} className="flex-1 bg-red-500 text-white font-bold py-3.5 rounded-xl shadow-float active:scale-95 transition-transform">
                                    {language === 'zh' ? '退出' : 'Log Out'}
                                </button>
                            </div>
                        </div>
                    </div>
                )}

                {/* Default Currency Selection Modal (Global) */}
                {showDefaultCurrencyModal && (
                    <div className="fixed inset-0 bg-black/60 backdrop-blur-sm flex items-end sm:items-center justify-center z-[100] animate-fade-in" onClick={() => setShowDefaultCurrencyModal(false)}>
                        <div className="bg-white dark:bg-darkCard w-full sm:w-80 rounded-t-2xl sm:rounded-2xl flex flex-col max-h-[80vh] shadow-xl pb-safe" onClick={e => e.stopPropagation()}>
                            <div className="flex justify-between items-center p-4 border-b border-gray-100 dark:border-darkBorder shrink-0">
                                <span className="font-bold text-textMain dark:text-darkTextMain">{language === 'zh' ? '选择默认货币' : 'Select Default Currency'}</span>
                                <button onClick={() => setShowDefaultCurrencyModal(false)} className="w-8 h-8 flex items-center justify-center text-textSub dark:text-darkTextSub hover:bg-gray-100 dark:hover:bg-darkBg rounded-full transition-colors">
                                    <i className="fa-solid fa-xmark text-lg"></i>
                                </button>
                            </div>
                            <div className="p-3 shrink-0">
                                <div className="bg-secondary dark:bg-darkBg rounded-xl flex items-center px-3 py-2">
                                    <i className="fa-solid fa-magnifying-glass text-gray-400 mr-2"></i>
                                    <input 
                                        type="text" 
                                        placeholder={t.searchCurrency} 
                                        value={currencySearch}
                                        onChange={e => setCurrencySearch(e.target.value)}
                                        className="bg-transparent outline-none flex-1 text-sm dark:text-darkTextMain"
                                    />
                                </div>
                            </div>
                            <div className="flex-1 overflow-y-auto px-2 pb-2">
                                {CURRENCY_DETAILS.filter(c => c.code.toLowerCase().includes(currencySearch.toLowerCase()) || c.name.includes(currencySearch)).map(c => {
                                    const isSelected = defaultCurrency === c.code;
                                    return (
                                        <div 
                                            key={c.code} 
                                            className={`flex items-center justify-between p-3 rounded-xl cursor-pointer transition-colors mb-1 ${isSelected ? 'bg-red-50 dark:bg-red-900/20' : 'hover:bg-gray-50 dark:hover:bg-darkBg active:bg-gray-100 dark:active:bg-darkBg'}`}
                                            onClick={() => { 
                                                setDefaultCurrency(c.code); 
                                                setCurrency(c.code);
                                                localStorage.setItem('payclear_default_currency', c.code);
                                                setShowDefaultCurrencyModal(false); 
                                            }}
                                        >
                                            <div className="flex items-center gap-3">
                                                <div className="w-8 h-auto shadow-sm rounded-sm overflow-hidden flex items-center justify-center shrink-0">
                                                    <img src={`https://flagcdn.com/w40/${c.countryCode}.png`} alt={c.code} className="w-full h-auto object-cover" />
                                                </div>
                                                <div className="flex flex-col">
                                                    <span className={`font-bold ${isSelected ? 'text-primary' : 'text-textMain dark:text-darkTextMain'}`}>{c.code} <span className="font-normal text-xs ml-1">{CURRENCY_SYMBOLS[c.code] || ''}</span></span>
                                                    <span className="text-xs text-textSub dark:text-darkTextSub truncate">{c.name}</span>
                                                </div>
                                            </div>
                                            {isSelected && <i className="fa-solid fa-check text-primary"></i>}
                                        </div>
                                    );
                                })}
                            </div>
                        </div>
                    </div>
                )}
            </>
        );
    }

        const style = document.createElement('style');
        style.innerHTML = `
            * {
                -webkit-tap-highlight-color: transparent;
                touch-action: manipulation;
            }
            .animate-fade-in { animation: fadeIn 0.2s ease-out forwards; }
            @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
            .pb-safe { padding-bottom: env(safe-area-inset-bottom, 20px); }
            
            /* Enhance tailwind active scale animations for more natural feel */
            .transition-transform {
                transition-timing-function: cubic-bezier(0.34, 1.56, 0.64, 1);
                transition-duration: 200ms;
            }
            .transition-all {
                transition-timing-function: cubic-bezier(0.34, 1.56, 0.64, 1);
                transition-duration: 200ms;
            }
            .transition-colors {
                transition-duration: 150ms;
            }
        `;
        document.head.appendChild(style);

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
