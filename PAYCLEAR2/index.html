        // Exchange Rate API Helper
        const fetchExchangeRate = async (from, to) => {
            if (from === to) return 1;
            try {
                const res = await fetch(`https://open.er-api.com/v6/latest/${from}`);
                const data = await res.json();
                return data.rates[to] || 1;
            } catch (e) {
                console.error("Exchange rate error:", e);
                return 1;
            }
        };

        // LocalStorage hook
        function useLocalStorage(key, initialValue) {
            const [storedValue, setStoredValue] = useState(() => {
                try {
                    const item = window.localStorage.getItem(key);
                    return item ? JSON.parse(item) : initialValue;
                } catch (error) {
                    return initialValue;
                }
            });

            const setValue = (value) => {
                try {
                    const valueToStore = value instanceof Function ? value(storedValue) : value;
                    setStoredValue(valueToStore);
                    window.localStorage.setItem(key, JSON.stringify(valueToStore));
                } catch (error) {
                    console.error(error);
                }
            };
            return [storedValue, setValue];
        }

        // Helper to get local date string YYYY-MM-DD
        const getTodayString = () => {
            const d = new Date();
            const year = d.getFullYear();
            const month = String(d.getMonth() + 1).padStart(2, '0');
            const day = String(d.getDate()).padStart(2, '0');
            return `${year}-${month}-${day}`;
        };

        // Helpers for Bill Split Logic
        const getBillParticipantIds = (bill) => {
            if (!bill.participants || bill.participants.length === 0) return [];
            if (typeof bill.participants[0] === 'string') return bill.participants;
            return bill.participants.map(p => p.id);
        };

        const getBillShare = (bill, userId) => {
            if (!bill.participants || !Array.isArray(bill.participants) || bill.participants.length === 0) return 0;
            if (typeof bill.participants[0] === 'string') {
                if (bill.participants.includes(userId)) {
                    return Number(bill.amount) / bill.participants.length;
                }
                return 0;
            } else {
                const p = bill.participants.find(p => p && p.id === userId);
                return p ? Number(p.amount) : 0;
            }

                        // Update group last_activity
                        setMyGroups(prev => {
                            const newGroups = [...prev];
                            const groupIndex = newGroups.findIndex(g => g.id === msg.group_id);
                            if (groupIndex > -1) {
                                newGroups[groupIndex] = { ...newGroups[groupIndex], last_activity: msg.created_at };
                                newGroups.sort((a, b) => new Date(b.last_activity) - new Date(a.last_activity));
                            }
                            return newGroups;
                        });

                        if (msg.user_id !== currentUser.id) {
                            supabase.from('groups').select('name').eq('id', msg.group_id).single().then(({data}) => {
                                if (data) {
                                    triggerNotification(`[${data.name}] ${msg.content}`, msg.group_id);
                                }
                            });
                        }

                    .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'bills' }, (payload) => {

                            const newGroups = [...prev];

                                setBills(prev => prev.filter(b => b.id !== payload.old.id));

                if (!dateString) return '';
                const date = new Date(dateString);
                const now = new Date();
                const diffMs = now - date;
                const diffMins = Math.floor(diffMs / 60000);
                
                if (diffMins < 5) return language === 'zh' ? '刚刚' : 'Just now';
                if (diffMins < 60) return language === 'zh' ? `${diffMins}分钟前` : `${diffMins}m ago`;
                
                const isToday = date.getDate() === now.getDate() && date.getMonth() === now.getMonth() && date.getFullYear() === now.getFullYear();
                
                if (isToday) {
                    return date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                }
                
                const yesterday = new Date(now);
                yesterday.setDate(yesterday.getDate() - 1);
                const isYesterday = date.getDate() === yesterday.getDate() && date.getMonth() === yesterday.getMonth() && date.getFullYear() === yesterday.getFullYear();
                
                if (isYesterday) {
                    return language === 'zh' ? '昨天' : 'Yesterday';

            // ============================

            const openReportCenter = async () => {

            // ============================

                    else if (/房|酒店|住宿|hotel|airbnb|rent|housing/i.test(text)) category = 'housing';
                    else if (/门票|玩|电影|ktv|密室|ticket|movie|fun|game/i.test(text)) category = 'entertainment';
                    else if (/买|超市|淘宝|衣服|网购|buy|shop|grocery|clothes|mall/i.test(text)) category = 'shopping';
                
                return { amount, category };
            };

            const handleSendChat = async (e) => {

            const handleAcceptSmartSuggestion = () => {

                setShowKeyboard(false);
                setSmartSuggestion(null);

            const handleMessageClick = (text, senderId) => {
                const parsed = parseExpenseText(text);
                if (parsed) {
                    openAddExpense();
                    setAmount(parsed.amount);
                    setSelectedCategory(parsed.category);
                    setPayerId(senderId);

                } else {
                    showToast(language === "zh" ? "未检测到账单金额" : "No bill amount detected", "error");
                }

            // ============================

            const [showGameModal, setShowGameModal] = useState(false);
            const [gameMode, setGameMode] = useState('select'); // 'select', 'roulette', 'cards', 'dice'
            const [gameStatus, setGameStatus] = useState('idle'); // 'idle', 'playing', 'done'
            const [gameWinner, setGameWinner] = useState(null);
            const [gameData, setGameData] = useState({});

            const openGameModal = () => {
                setGameMode('select');
                setGameStatus('idle');
                setGameWinner(null);
                setGameData({});
                setShowGameModal(true);
            };

            const handleGameSettle = () => {
                if (gameWinner) {
                    openAddExpense();
                    setPayerId(gameWinner.id);
                    setShowGameModal(false);
                }
            };

            // Game 1: Roulette
            const initRoulette = () => {
                if (!groupMembers || groupMembers.length === 0) return;
                setGameStatus('playing');
                setGameWinner(null);
                let counter = 0;
                const interval = setInterval(() => {
                    const randomIdx = Math.floor(Math.random() * groupMembers.length);
                    setGameWinner(groupMembers[randomIdx]);
                    counter++;
                    if (counter >= 20) {
                        clearInterval(interval);
                        setGameStatus('done');
                    }
                }, 100);
            };

            // Game 2: Bomb Cards
            const initCards = () => {
                if (!groupMembers || groupMembers.length === 0) return;
                const shuffled = [...groupMembers].sort(() => Math.random() - 0.5);
                const bombIdx = Math.floor(Math.random() * shuffled.length);
                setGameData({ members: shuffled, bombIdx, flipped: [] });
                setGameStatus('playing');
                setGameWinner(null);
            };

            const handleCardClick = (idx) => {
                if (gameStatus !== 'playing' || gameData.flipped.includes(idx)) return;
                const newFlipped = [...gameData.flipped, idx];
                setGameData({ ...gameData, flipped: newFlipped });
                if (idx === gameData.bombIdx) {
                    setGameWinner(gameData.members[idx]);
                    setGameStatus('done');
                }
            };

            // Game 3: Lowest Dice
            const initDice = () => {
                if (!groupMembers || groupMembers.length === 0) return;
                setGameStatus('playing');
                setGameWinner(null);
                setGameData({ rolling: true, results: {} });
                
                let ticks = 0;
                const interval = setInterval(() => {
                    const tempResults = {};
                    groupMembers.forEach(m => tempResults[m.id] = Math.floor(Math.random() * 6) + 1);
                    setGameData({ rolling: true, results: tempResults });
                    ticks++;
                    if (ticks >= 15) {
                        clearInterval(interval);
                        let lowestScore = 7;
                        let losers = [];
                        Object.entries(tempResults).forEach(([uid, score]) => {
                            if (score < lowestScore) { lowestScore = score; losers = [uid]; }
                            else if (score === lowestScore) { losers.push(uid); }
                        });
                        const finalLoserId = losers[Math.floor(Math.random() * losers.length)];
                        const finalLoser = groupMembers.find(m => m.id === finalLoserId);
                        
                        setGameData({ rolling: false, results: tempResults, losers });
                        setGameWinner(finalLoser);
                        setGameStatus('done');
                    }
                }, 100);
            };

            const [isCreatingGroup, setIsCreatingGroup] = useState(false);

            const handleToggleSettleGroup = async (group) => {

                } catch (e) {

                    openGroup(group.id);

                    showToast(language === 'zh' ? '创建群组失败' : 'Failed to create group', 'error');
                } finally {
                    setIsCreatingGroup(false);
                }
            };

            const handleCalcInput = (val) => {
                if (activeInput === 'total') {
                    if (amount === '0' && val !== '.' && val !== '+' && val !== '-') {
                        setAmount(val);
                    } else {
                        // Prevent consecutive operators
                        const lastChar = amount.slice(-1);
                        if (['+', '-', '.'].includes(val) && ['+', '-', '.'].includes(lastChar)) {
                            return;
                        }
                        setAmount(prev => prev + val);
                    }
                } else {
                    setSplitAmounts(prev => {
                        const currentVal = prev[activeInput] || '0';
                        let newVal;
                        if (currentVal === '0' && val !== '.' && val !== '+' && val !== '-') {
                            newVal = val;
                        } else {
                            const lastChar = currentVal.slice(-1);
                            if (['+', '-', '.'].includes(val) && ['+', '-', '.'].includes(lastChar)) {
                                return prev;
                            }
                            newVal = currentVal + val;
                        }
                        
                        if (!newVal.includes('+') && !newVal.includes('-') && !newVal.endsWith('.')) {
                            let sum = parseFloat(newVal) || 0;
                            Object.keys(prev).forEach(k => {
                                if (k !== activeInput) sum += parseFloat(prev[k]) || 0;
                            });
                            
                            if (splitType === 'exact') {
                                const totalAmount = parseFloat(amount) || 0;
                                if (sum > totalAmount) {
                                    showToast(language === 'zh' ? '已超过总金额！' : 'Exceeds total amount!', 'error');
                                    return prev;
                                }
                            } else if (splitType === 'percent') {
                                if (sum > 100) {
                                    showToast(language === 'zh' ? '总比例不能超过100%！' : 'Total percentage cannot exceed 100%!', 'error');
                                    return prev;
                                }
                            }
                        }
                        return { ...prev, [activeInput]: newVal };
                    });
                }
            };

            const handleDeleteCalc = () => {
                if (activeInput === 'total') {
                    if (amount.length > 1) {
                        setAmount(prev => prev.slice(0, -1));
                    } else {
                        setAmount('0');
                    }
                } else {
                    setSplitAmounts(prev => {
                        const currentVal = prev[activeInput] || '0';
                        if (currentVal.length > 1) {
                            return { ...prev, [activeInput]: currentVal.slice(0, -1) };
                        } else {
                            return { ...prev, [activeInput]: '0' };
                        }
                    });
                }
            };

            const handleConfirmCalc = () => {
                try {
                    // Evaluate simple math expressions like 10+5
                    // eslint-disable-next-line no-eval
                    const result = eval(amount);
                    if (!isNaN(result) && isFinite(result)) {
                        setAmount(parseFloat(result.toFixed(2)).toString());
                    } else {
                        setAmount('0');
                    }
                } catch (e) {
                    setAmount('0');
                }
            };

            const openAddExpense = () => {
                setEditingBillId(null);
                setAmount('0');
                setCurrency(defaultCurrency);
                setActiveInput('total');
                setPayerId(currentUser.id);
                setParticipants(groupMembers.map(m => m.id)); // Default split equally
                setSplitType('equal');
                setSplitAmounts({});
                setSelectedCategory('daily');
                setExpenseDate(getTodayString());
                setShowKeyboard(true);
                setShowAddExpense(true);

                // Fetch live rates when opening expense modal so we can show real-time conversion
                if (currentGroup && Object.keys(liveRates).length === 0) {
                    fetch(`https://open.er-api.com/v6/latest/${currentGroup.main_currency}`)
                        .then(res => res.json())
                        .then(data => {
                            if (data && data.rates) {
                                const invertedRates = {};
                                Object.keys(data.rates).forEach(c => {
                                    invertedRates[c] = 1 / data.rates[c];
                                });
                                setLiveRates(invertedRates);
                            }
                        })
                        .catch(e => console.error("Failed to fetch rates:", e));
                }
            };

            const handleEditBill = (bill) => {
                setEditingBillId(bill.id);
                setAmount(bill.original_amount.toString());
                setActiveInput('total');
                setCurrency(bill.original_currency);
                setPayerId(bill.payer_id);
                setSelectedCategory(bill.category);
                setExpenseDate(bill.date.replace(/\//g, '-'));
                setShowKeyboard(false);
                
                const pIds = getBillParticipantIds(bill);
                setParticipants(pIds);
                
                if (bill.participants && bill.participants.length > 0 && typeof bill.participants[0] === 'object') {
                    // Check if it's exact or percent
                    // For simplicity, we just map it back to exact for now
                    setSplitType('exact');
                    const amounts = {};
                    bill.participants.forEach(p => amounts[p.id] = p.amount);
                    setSplitAmounts(amounts);
                } else {
                    setSplitType('equal');
                    setSplitAmounts({});
                }
                
                setShowAddExpense(true);
            };

            const handleSubmitExpense = async () => {
                if (!supabase || !currentGroup || !currentUser) return;
                const numAmount = parseFloat(amount);
                if (numAmount <= 0) return alert(t.invalidAmount);
                if (participants.length === 0) return alert(t.selectParticipantsFirst);

                setIsSubmittingExpense(true);
                try {
                    const cat = CATEGORIES.find(c => c.id === selectedCategory) || CATEGORIES[0];
                    
                    // Use liveRates if available (especially if user edited it), otherwise fetch
                    let rate = 1;
                    if (currency !== currentGroup.main_currency) {
                        if (liveRates[currency]) {
                            rate = liveRates[currency];
                        } else {
                            rate = await fetchExchangeRate(currency, currentGroup.main_currency);
                        }
                    }
                    const finalAmount = numAmount * rate;
                    
                    let finalParticipants = participants;
                    if (splitType === 'exact') {
                        let totalSplit = 0;
                        finalParticipants = participants.map(id => {
                            const pAmount = parseFloat(splitAmounts[id] || 0);
                            totalSplit += pAmount;
                            return { id, amount: pAmount * rate }; // Convert to main currency
                        });
                        // Allow small rounding differences
                        if (Math.abs(totalSplit - numAmount) > 0.1) {
                            setIsSubmittingExpense(false);
                            return alert(t.splitAmountError);
                        }
                    } else if (splitType === 'percent') {
                        let totalPercent = 0;
                        finalParticipants = participants.map(id => {
                            const pPercent = parseFloat(splitAmounts[id] || 0);
                            totalPercent += pPercent;
                            return { id, amount: finalAmount * (pPercent / 100) };
                        });
                        if (Math.abs(totalPercent - 100) > 0.1) {
                            setIsSubmittingExpense(false);
                            return alert(t.splitPercentError);
                        }
                    }

                    const billData = {
                        group_id: currentGroup.id,
                        category: selectedCategory,
                        description: cat.name,
                        amount: finalAmount,
                        original_amount: numAmount,
                        original_currency: currency,
                        payer_id: payerId,
                        participants: finalParticipants,
                        date: expenseDate.replace(/-/g, '/') // Format as YYYY/MM/DD
                    };

                    if (editingBillId) {
                        await supabase.from('bills').update(billData).eq('id', editingBillId);
                    } else {
                        await supabase.from('bills').insert(billData);
                    }
                    
                    setShowAddExpense(false);
                    openGroup(currentGroup.id); // Refresh bills
                } catch (error) {
                    console.error(error);
                    alert(t.saveFailed);
                } finally {
                    setIsSubmittingExpense(false);
                }
            };

            const handleDeleteBill = async () => {
                if (!editingBillId || !supabase || !currentGroup) return;
                if (!confirm(t.deleteConfirm)) return;
                
                setIsSubmittingExpense(true);
                try {
                    await supabase.from('bills').delete().eq('id', editingBillId);
                    setShowAddExpense(false);
                    openGroup(currentGroup.id);
                } catch (e) {
                    console.error(e);
                    alert(t.deleteFailed);
                } finally {
                    setIsSubmittingExpense(false);
                }
            };

            const handleSettleUp = () => {
                if (!currentGroup || !groupMembers || !bills) return;
                
                const balances = {};
                groupMembers.forEach(m => balances[m.id] = { name: m.name, amount: 0 });

                bills.forEach(bill => {
                    if (balances[bill.payer_id]) balances[bill.payer_id].amount += bill.amount;
                    
                    const pIds = getBillParticipantIds(bill);
                    pIds.forEach(pid => {
                        if (balances[pid]) balances[pid].amount -= getBillShare(bill, pid);
                    });
                });

                const debtors = [];
                const creditors = [];
                Object.keys(balances).forEach(id => {
                    if (balances[id].amount < -0.01) debtors.push({ id, name: balances[id].name, amount: Math.abs(balances[id].amount) });
                    else if (balances[id].amount > 0.01) creditors.push({ id, name: balances[id].name, amount: balances[id].amount });
                });

                debtors.sort((a, b) => b.amount - a.amount);
                creditors.sort((a, b) => b.amount - a.amount);

                const results = [];
                let i = 0, j = 0;
                while (i < debtors.length && j < creditors.length) {
                    const debtor = debtors[i];
                    const creditor = creditors[j];
                    const settleAmount = Math.min(debtor.amount, creditor.amount);

                    results.push({
                        from: debtor.name,
                        to: creditor.name,
                        amount: settleAmount.toFixed(2)
                    });

                    debtor.amount -= settleAmount;
                    creditor.amount -= settleAmount;

                    if (debtor.amount < 0.01) i++;
                    if (creditor.amount < 0.01) j++;
                }

                setSettlements(results);
                setShowSettleModal(true);
            };

            const handleSearchUser = async (e) => {
                e.preventDefault();
                const term = searchUsername.trim();
                if (!term || !supabase) return;

                setSearchStatus('searching');
                setSearchResults([]);
                
                const { data: users, error } = await supabase.from('users')
                    .select('id, name, user_code')
                    .or(`name.eq."${term}",user_code.eq."${term}"`);
                
                if (users && users.length > 0) {
                    // Exclude self from search results
                    const others = users.filter(u => u.id !== currentUser.id);
                    if (others.length > 0) {
                        setSearchResults(others);
                        setSearchStatus('done');
                    } else {
                        setSearchStatus('not_found');
                    }
                } else {
                    setSearchStatus('not_found');
                }
            };

            const handleAddSearchedFriend = async (targetUser) => {
                if (!targetUser) return;

                // Check if already friends
                const { data: existing } = await supabase.from('friendships')
                    .select('*')
                    .or(`and(user_id1.eq.${currentUser.id},user_id2.eq.${targetUser.id}),and(user_id1.eq.${targetUser.id},user_id2.eq.${currentUser.id})`);
                
                if (!existing || existing.length === 0) {
                    const id1 = currentUser.id < targetUser.id ? currentUser.id : targetUser.id;
                    const id2 = currentUser.id < targetUser.id ? targetUser.id : currentUser.id;
                    const { error: insertError } = await supabase.from('friendships').insert({ user_id1: id1, user_id2: id2 });
                    
                    if (insertError) {
                        console.error("Insert Friend Error:", insertError);
                        showToast((language === "zh" ? "添加失败: " : "Add failed: ") + insertError.message, "error");
                    } else {
                        showToast(language === "zh" ? "添加好友成功！" : "Friend added successfully!");
                    }
                    
                    setShowSearchUserModal(false);
                    setSearchUsername('');
                    setSearchResults([]);
                    setSearchStatus('idle');
                    
                    // Delay slightly to ensure Supabase replication lag doesn't cause a miss
                    setTimeout(fetchDashboardData, 500);
                } else {
                    showToast(language === "zh" ? "你们已经是好友啦！" : "You are already friends!", "error");
                }
            };

            // QR Code logic
            useEffect(() => {
                if (showQRModal && qrRef.current) {
                    qrRef.current.innerHTML = '';
                    
                    // If on localhost, use the actual LAN IP for mobile scanning
                    let host = window.location.host;
                    if (host.includes('localhost') || host.includes('127.0.0.1')) {
                        host = '192.168.10.116:8000'; // Replace with actual LAN IP
                    }
                    
                    const baseUrl = window.location.protocol + '//' + host + window.location.pathname;
                    const url = qrData.type === 'friend' 
                        ? `${baseUrl}?add_friend=${qrData.id}`
                        : `${baseUrl}?join_group=${qrData.id}`;

                    new QRCode(qrRef.current, {
                        text: url,
                        width: 200,
                        height: 200,
                        colorDark : "#000000",
                        colorLight : "#ffffff",
                        correctLevel : QRCode.CorrectLevel.H
                    });
                }
            }, [showQRModal, qrData]);

            // Scanner logic
            useEffect(() => {
                let html5QrcodeScanner = null;
                
                if (showScannerModal) {
                    // Check if browser supports camera (usually requires HTTPS)
                    if (window.isSecureContext === false) {
                        alert(t.cameraBlocked);
                        setShowScannerModal(false);
                        return;
                    }

                    // Small delay to ensure DOM is ready
                    setTimeout(() => {
                        html5QrcodeScanner = new Html5QrcodeScanner(
                            "reader",
                            { fps: 10, qrbox: {width: 250, height: 250}, aspectRatio: 1.0 },
                            /* verbose= */ false
                        );
                        
                        html5QrcodeScanner.render((decodedText, decodedResult) => {
                            // Handle on success
                            console.log(`Scan result: ${decodedText}`);
                            html5QrcodeScanner.clear();
                            setShowScannerModal(false);
                            
                            // Check if it's our URL format
                            try {
                                const url = new URL(decodedText);
                                const addFriendParam = url.searchParams.get('add_friend');
                                const joinGroupParam = url.searchParams.get('join_group');
                                
                                if (addFriendParam) {
                                    window.location.href = decodedText;
                                } else if (joinGroupParam) {
                                    window.location.href = decodedText;
                                } else {
                                    alert(t.invalidQR);
                                }
                            } catch (e) {
                                alert(t.unrecognizedQR);
                            }
                        }, (errorMessage) => {
                            // parse error, ignore
                        });
                    }, 100);
                }

                return () => {
                    if (html5QrcodeScanner) {
                        html5QrcodeScanner.clear().catch(e => console.error(e));
                    }
                };
            }, [showScannerModal]);

            // ECharts hook for Report Center
            useEffect(() => {
                if (activeScreen !== 'report') return;

                // 1. Filter bills based on time range
                const now = new Date();
                const filteredBills = reportBills.filter(bill => {
                    const bDate = new Date(bill.date);
                    if (reportTimeRange === 'today') {
                        return bDate.getDate() === now.getDate() && bDate.getMonth() === now.getMonth() && bDate.getFullYear() === now.getFullYear();
                    } else if (reportTimeRange === 'this_month') {
                        return bDate.getMonth() === now.getMonth() && bDate.getFullYear() === now.getFullYear();
                    } else if (reportTimeRange === 'last_month') {
                        const lastMonth = new Date(now.getFullYear(), now.getMonth() - 1, 1);
                        return bDate.getMonth() === lastMonth.getMonth() && bDate.getFullYear() === lastMonth.getFullYear();
                    } else if (reportTimeRange === 'last_30_days') {
                        const diffTime = Math.abs(now - bDate);
                        const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24)); 
                        return diffDays <= 30;
                    } else if (reportTimeRange === 'this_year') {
                        return bDate.getFullYear() === now.getFullYear();
                    } else if (reportTimeRange === 'custom') {
                        if (!customDateRange.start && !customDateRange.end) return true;
                        let isValid = true;
                        if (customDateRange.start) {
                            const start = new Date(customDateRange.start);
                            start.setHours(0, 0, 0, 0);
                            if (bDate < start) isValid = false;
                        }
                        if (customDateRange.end) {
                            const end = new Date(customDateRange.end);
                            end.setHours(23, 59, 59, 999);
                            if (bDate > end) isValid = false;
                        }
                        return isValid;
                    }
                    return true; // 'all'
                });

                // Calculate total expense (only my share)
                let totalExpense = 0;
                const categoryMap = {};
                const dateMap = {};

                filteredBills.forEach(bill => {
                    // My personal share
                    const myShare = getBillShare(bill, currentUser.id);
                    totalExpense += myShare;

                    // Aggregate by Category
                    categoryMap[bill.category] = (categoryMap[bill.category] || 0) + myShare;

                    // Aggregate by Date for Trend
                    let trendKey = bill.date;
                    if (trendGroupBy === 'month') {
                        const parts = bill.date.split('/');
                        if (parts.length >= 2) trendKey = `${parts[0]}/${parts[1]}`;
                    } else if (trendGroupBy === 'year') {
                        const parts = bill.date.split('/');
                        if (parts.length >= 1) trendKey = `${parts[0]}`;
                    }
                    dateMap[trendKey] = (dateMap[trendKey] || 0) + myShare;
                });

                // Prepare Category Data
                const pieData = Object.keys(categoryMap).map(catId => {
                    const catObj = CATEGORIES.find(c => c.id === catId) || CATEGORIES[0];
                    // extract hex color from tailwind class roughly or use default ECharts palette
                    const colorMap = {
                        'daily': '#22c55e', 'food': '#f97316', 'transport': '#3b82f6', 
                        'housing': '#6366f1', 'tickets': '#ef4444', 'comm': '#06b6d4', 
                        'shopping': '#ec4899', 'drinks': '#a855f7', 'entertainment': '#eab308',
                        'medical': '#f43f5e', 'beauty': '#d946ef', 'education': '#0ea5e9',
                        'investment': '#10b981', 'gifts': '#f87171', 'pets': '#f59e0b'
                    };
                    return { 
                        name: language === 'zh' ? catObj.name : catObj.en_name, 
                        value: categoryMap[catId].toFixed(2),
                        itemStyle: { color: colorMap[catId] || '#ff2442' }
                    };
                }).sort((a, b) => b.value - a.value);

                // Prepare Trend Data (sort by date)
                const sortedDates = Object.keys(dateMap).sort((a, b) => new Date(a) - new Date(b));
                const trendValues = sortedDates.map(d => dateMap[d].toFixed(2));

                // Initialize ECharts
                let trendChart, categoryChart;
                
                setTimeout(() => {
                    if (trendChartRef.current && window.echarts) {
                        trendChart = window.echarts.init(trendChartRef.current);
                        
                        // If there's only one data point, add some empty padding points so it doesn't look like a single dot in the middle of nowhere
                        let chartDates = [...sortedDates];
                        let chartValues = [...trendValues];
                        
                        if (chartDates.length === 1) {
                            let prevStr = '';
                            let nextStr = '';
                            const currentStr = chartDates[0];
                            
                            if (trendGroupBy === 'day') {
                                const d = new Date(currentStr);
                                const prev = new Date(d); prev.setDate(d.getDate() - 1);
                                const next = new Date(d); next.setDate(d.getDate() + 1);
                                const formatDt = (dt) => `${dt.getFullYear()}/${String(dt.getMonth()+1).padStart(2,'0')}/${String(dt.getDate()).padStart(2,'0')}`;
                                prevStr = formatDt(prev);
                                nextStr = formatDt(next);
                            } else if (trendGroupBy === 'month') {
                                const parts = currentStr.split('/');
                                const year = parseInt(parts[0]);
                                const month = parseInt(parts[1]);
                                const prevD = new Date(year, month - 2, 1);
                                const nextD = new Date(year, month, 1);
                                const formatMt = (dt) => `${dt.getFullYear()}/${String(dt.getMonth()+1).padStart(2,'0')}`;
                                prevStr = formatMt(prevD);
                                nextStr = formatMt(nextD);
                            } else if (trendGroupBy === 'year') {
                                const year = parseInt(currentStr);
                                prevStr = `${year - 1}`;
                                nextStr = `${year + 1}`;
                            }
                            
                            chartDates = [prevStr, currentStr, nextStr];
                            chartValues = [0, chartValues[0], 0];
                        } else if (chartDates.length === 0) {
                            chartDates = [t.noDataLabel];
                            chartValues = [0];
                        }

                        const isDark = document.documentElement.classList.contains('dark');

                        trendChart.setOption({
                            tooltip: { 
                                trigger: 'axis', 
                                formatter: '{b}<br/>' + t.expense + ': ¥{c}',
                                backgroundColor: isDark ? '#1f2937' : 'rgba(255, 255, 255, 0.9)',
                                borderColor: isDark ? '#374151' : '#e5e7eb',
                                textStyle: { color: isDark ? '#f3f4f6' : '#374151' }
                            },
                            grid: { left: '2%', right: '5%', bottom: '5%', top: '15%', containLabel: true },
                            xAxis: { 
                                type: 'category', 
                                boundaryGap: true, 
                                data: chartDates, 
                                axisLine: { lineStyle: { color: isDark ? '#374151' : '#e5e7eb' } }, 
                                axisTick: { show: false }, 
                                axisLabel: { color: isDark ? '#9ca3af' : '#6b7280', fontSize: 10, margin: 12 } 
                            },
                            yAxis: { 
                                type: 'value', 
                                show: true,
                                splitLine: { lineStyle: { color: isDark ? '#374151' : '#f3f4f6', type: 'dashed' } },
                                axisLabel: { color: isDark ? '#6b7280' : '#9ca3af', fontSize: 10, formatter: '¥{value}' }
                            },
                            series: [{
                                data: chartValues,
                                type: trendChartType, // 'line' or 'bar'
                                barMaxWidth: 30,
                                smooth: true,
                                symbol: 'circle',
                                symbolSize: 8,
                                label: {
                                    show: true,
                                    position: 'top',
                                    formatter: function(params) {
                                        // 如果是补出来的数据0，并且只有一个真实数据时，不显示0的标签
                                        if (params.value === 0 && chartDates.length === 3) return '';
                                        return '¥' + params.value;
                                    },
                                    color: '#ff2442',
                                    fontSize: 10,
                                    distance: 5
                                },
                                itemStyle: { color: '#ff2442', borderRadius: trendChartType === 'bar' ? [4, 4, 0, 0] : 0 },
                                areaStyle: trendChartType === 'line' ? {
                                    color: new window.echarts.graphic.LinearGradient(0, 0, 0, 1, [
                                        { offset: 0, color: 'rgba(255, 36, 66, 0.4)' },
                                        { offset: 1, color: 'rgba(255, 36, 66, 0.05)' }
                                    ])
                                } : null
                            }]
                        });
                    }

                    if (categoryChartRef.current && window.echarts) {
                        categoryChart = window.echarts.init(categoryChartRef.current);
                        const isDark = document.documentElement.classList.contains('dark');
                        categoryChart.setOption({
                            tooltip: { 
                                trigger: 'item', 
                                formatter: '{b}: ¥{c} ({d}%)',
                                backgroundColor: isDark ? '#1f2937' : 'rgba(255, 255, 255, 0.9)',
                                borderColor: isDark ? '#374151' : '#e5e7eb',
                                textStyle: { color: isDark ? '#f3f4f6' : '#374151' }
                            },
                            series: [{
                                type: 'pie',
                                radius: ['40%', '70%'], // Slightly smaller to make room for labels
                                center: ['50%', '50%'],
                                avoidLabelOverlap: true,
                                itemStyle: { borderRadius: 8, borderColor: isDark ? '#1f2937' : '#fff', borderWidth: 2 },
                                label: { 
                                    show: true, 
                                    position: 'outside',
                                    formatter: '{b}\n{d}%', // Category name and percentage
                                    fontSize: 11,
                                    fontWeight: 'bold',
                                    color: isDark ? '#9ca3af' : '#4b5563',
                                    lineHeight: 14
                                },
                                labelLine: { 
                                    show: true,
                                    length: 10,
                                    length2: 15,
                                    smooth: true,
                                    lineStyle: { color: isDark ? '#4b5563' : '#d1d5db' }
                                },
                                emphasis: { 
                                    itemStyle: { shadowBlur: 10, shadowOffsetX: 0, shadowColor: 'rgba(0, 0, 0, 0.5)' }
                                },
                                data: pieData.length > 0 ? pieData : [{ name: t.noRecordLabel, value: 0, itemStyle: { color: isDark ? '#374151' : '#e5e7eb' }, label: { show: false }, labelLine: { show: false } }]
                            }]
                        });
                    }
                }, 100);

                const handleResize = () => {
                    trendChart && trendChart.resize();
                    categoryChart && categoryChart.resize();
                };
                window.addEventListener('resize', handleResize);

                return () => {
                    window.removeEventListener('resize', handleResize);
                    trendChart && trendChart.dispose();
                    categoryChart && categoryChart.dispose();
                };

            }, [activeScreen, reportTimeRange, reportBills, customDateRange, trendGroupBy, trendChartType, themeMode]);

            // ============================
            // Render Components
            // ============================

            const SwipeableNotification = ({ children, onClose, onClick, className = '' }) => {
                const [offsetY, setOffsetY] = useState(0);
                const startYRef = useRef(0);
                const isSwipingRef = useRef(false);

                const handleTouchStart = (e) => {
                    startYRef.current = e.touches ? e.touches[0].clientY : e.clientY;
                    isSwipingRef.current = true;
                };

                const handleTouchMove = (e) => {
                    if (!isSwipingRef.current) return;
                    const clientY = e.touches ? e.touches[0].clientY : e.clientY;
                    const deltaY = clientY - startYRef.current;
                    if (deltaY < 0) { // Only allow swipe up
                        setOffsetY(deltaY);
                    }
                };

                const handleTouchEnd = () => {
                    if (!isSwipingRef.current) return;
                    isSwipingRef.current = false;
                    if (offsetY < -40) {
                        onClose();
                    } else {
                        setOffsetY(0);
                    }
                };

                return (
                    <div 
                        className={`fixed top-4 left-1/2 -translate-x-1/2 z-[110] toast-enter w-[90%] max-w-sm ${className}`}
                        style={{ transform: `translate(-50%, ${offsetY}px)`, transition: isSwipingRef.current ? 'none' : 'transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275)' }}
                        onTouchStart={handleTouchStart}
                        onTouchMove={handleTouchMove}
                        onTouchEnd={handleTouchEnd}
                        onMouseDown={handleTouchStart}
                        onMouseMove={handleTouchMove}
                        onMouseUp={handleTouchEnd}
                        onMouseLeave={handleTouchEnd}
                        onClick={onClick}
                    >
                        {children}
                    </div>
                );
            };

            const renderGlobalOverlays = () => (
                <>
                    {/* Install PWA Guide Modal */}
                    {showInstallModal && (
                        <div className="fixed inset-0 bg-black/60 backdrop-blur-sm flex items-center justify-center p-4 z-[120] animate-fade-in" onClick={() => setShowInstallModal(false)}>
                            <div className="bg-white dark:bg-darkCard w-full max-w-sm rounded-3xl p-6 shadow-2xl" onClick={e => e.stopPropagation()}>
                                <div className="flex justify-between items-center mb-4">
                                    <h3 className="text-xl font-bold text-textMain dark:text-darkTextMain">{language === 'zh' ? '添加到桌面' : 'Add to Home Screen'}</h3>
                                    <button onClick={() => setShowInstallModal(false)} className="text-gray-400 hover:text-textMain dark:hover:text-darkTextMain"><i className="fa-solid fa-xmark text-xl"></i></button>
                                </div>
                                <div className="text-center py-4 space-y-4 text-textSub dark:text-darkTextSub">
                                    {isIOSDevice ? (
                                        <>
                                            <div className="flex justify-center mb-2 text-primary text-4xl"><i className="fa-solid fa-arrow-up-from-bracket"></i></div>
                                            <p>{language === 'zh' ? '1. 点击浏览器下方工具栏的' : '1. Tap the'} <strong className="text-textMain dark:text-darkTextMain">{language === 'zh' ? '分享图标' : 'Share icon'}</strong></p>
                                            <p>{language === 'zh' ? '2. 在弹出的菜单中，向下滑动' : '2. Scroll down in the menu'}</p>
                                            <p>{language === 'zh' ? '3. 点击' : '3. Tap'} <strong className="text-textMain dark:text-darkTextMain">"{language === 'zh' ? '添加到主屏幕' : 'Add to Home Screen'}"</strong></p>
                                        </>
                                    ) : (
                                        <>
                                            <div className="flex justify-center mb-2 text-primary text-4xl"><i className="fa-solid fa-ellipsis-vertical"></i></div>
                                            <p>{language === 'zh' ? '1. 点击浏览器右上角的' : '1. Tap the'} <strong className="text-textMain dark:text-darkTextMain">{language === 'zh' ? '菜单图标' : 'Menu icon'}</strong></p>
                                            <p>{language === 'zh' ? '2. 点击' : '2. Tap'} <strong className="text-textMain dark:text-darkTextMain">"{language === 'zh' ? '添加到主屏幕' : 'Add to Home Screen'}"</strong> {language === 'zh' ? '或' : 'or'} <strong className="text-textMain dark:text-darkTextMain">"{language === 'zh' ? '安装应用' : 'Install App'}"</strong></p>
                                        </>
                                    )}
                                </div>
                                <button onClick={() => setShowInstallModal(false)} className="w-full mt-4 bg-primary text-white font-bold py-3 rounded-xl shadow-float active:scale-95 transition-transform">{language === 'zh' ? '我知道了' : 'Got it'}</button>
                            </div>
                        </div>
                    )}

                    {toast.show && (
                        <SwipeableNotification onClose={() => setToast({ show: false, message: '', type: 'success' })}>
                            <div className={`px-4 py-3 rounded-xl shadow-float flex items-center gap-3 ${toast.type === 'success' ? 'bg-white dark:bg-darkCard text-textMain dark:text-darkTextMain' : 'bg-red-50 text-red-500'}`}>
                                <div className={`w-8 h-8 rounded-full flex items-center justify-center text-white shrink-0 ${toast.type === 'success' ? 'bg-green-500' : 'bg-red-500'}`}>
                                    <i className={`fa-solid ${toast.type === 'success' ? 'fa-check' : 'fa-xmark'}`}></i>
                                </div>
                                <span className="font-bold text-sm">{toast.message}</span>
                            </div>
                        </SwipeableNotification>
                    )}

                    {sysNotification.show && (
                        <SwipeableNotification 
                            className="cursor-pointer"
                            onClose={() => setSysNotification({ show: false, message: '', groupId: null })}
                            onClick={() => {
                                setSysNotification({ show: false, message: '', groupId: null });
                                openGroup(sysNotification.groupId);
                            }}
                        >
                            <div className="bg-white dark:bg-darkCard px-4 py-3 rounded-xl shadow-float flex items-center gap-3 border-l-4 border-primary">
                                <div className="w-8 h-8 bg-primaryLight text-primary rounded-full flex items-center justify-center shrink-0">
                                    <i className="fa-solid fa-bell"></i>
                                </div>
                                <span className="font-bold text-sm text-textMain dark:text-darkTextMain line-clamp-2">{sysNotification.message}</span>
                            </div>
                        </SwipeableNotification>
                    )}

                    {/* Delete Group Confirm Modal */}
                    {deleteGroupTarget && (
                        <div className="fixed inset-0 bg-black/60 backdrop-blur-sm flex items-center justify-center p-4 z-[120] animate-fade-in" onClick={() => setDeleteGroupTarget(null)}>
                            <div className="bg-white dark:bg-darkCard w-full max-w-sm rounded-3xl p-6 shadow-2xl" onClick={e => e.stopPropagation()}>
                                <div className="flex justify-center mb-4 text-red-500 text-5xl">
                                    <i className="fa-solid fa-triangle-exclamation"></i>
                                </div>
                                <h3 className="text-xl font-bold text-center text-textMain dark:text-darkTextMain mb-2">
                                    {language === 'zh' ? '确定要删除此群聊吗？' : 'Delete this group?'}
                                </h3>
                                <p className="text-center text-textSub dark:text-darkTextSub mb-6 text-sm">
                                    {language === 'zh' 
                                        ? '删除后，该群聊内的所有记账记录和聊天内容将被永久清空且无法恢复。' 
                                        : 'All bills and messages in this group will be permanently deleted and cannot be recovered.'}
                                </p>
                                <div className="flex gap-3">
                                    <button 
                                        onClick={() => setDeleteGroupTarget(null)} 
                                        className="flex-1 py-3.5 bg-gray-100 dark:bg-darkBorder text-textMain dark:text-darkTextMain font-bold rounded-xl active:scale-95 transition-transform"
                                    >
                                        {language === 'zh' ? '取消' : 'Cancel'}
                                    </button>
                                    <button 
                                        onClick={handleDeleteGroupConfirm} 
                                        className="flex-1 py-3.5 bg-red-500 text-white font-bold rounded-xl shadow-float active:scale-95 transition-transform"
                                    >
                                        {language === 'zh' ? '确认删除' : 'Delete'}
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}
                </>
            );

            const SwipeableGroupItem = ({ group, onClick, onDelete, onToggleSettle, language, t, formatActivityTime }) => {
                const [offsetX, setOffsetX] = useState(0);
                const [isOpen, setIsOpen] = useState(false);
                const startXRef = useRef(0);
                const isSwipingRef = useRef(false);
                const itemRef = useRef(null);

                const ACTION_WIDTH = 140; // 70px per button

                const handleTouchStart = (e) => {
                    startXRef.current = e.touches ? e.touches[0].clientX : e.clientX;
                    isSwipingRef.current = true;
                };

                const handleTouchMove = (e) => {
                    if (!isSwipingRef.current) return;
                    const clientX = e.touches ? e.touches[0].clientX : e.clientX;
                    const deltaX = clientX - startXRef.current;
                    
                    if (deltaX < 0) {
                        const newOffset = isOpen ? Math.max(-ACTION_WIDTH - 20, -ACTION_WIDTH + deltaX) : Math.max(-ACTION_WIDTH - 20, deltaX);
                        setOffsetX(newOffset);
                    } else if (isOpen && deltaX > 0) {
                        setOffsetX(Math.min(0, -ACTION_WIDTH + deltaX));
                    }
                };

                const handleTouchEnd = () => {
                    if (!isSwipingRef.current) return;
                    isSwipingRef.current = false;
                    if (offsetX < -ACTION_WIDTH / 2) {
                        setOffsetX(-ACTION_WIDTH);
                        setIsOpen(true);
                    } else {
                        setOffsetX(0);
                        setIsOpen(false);
                    }
                };

                useEffect(() => {
                    const handleClickOutside = (e) => {
                        if (isOpen && itemRef.current && !itemRef.current.contains(e.target)) {
                            setOffsetX(0);
                            setIsOpen(false);
                        }
                    };
                    document.addEventListener('mousedown', handleClickOutside);
                    document.addEventListener('touchstart', handleClickOutside);
                    return () => {
                        document.removeEventListener('mousedown', handleClickOutside);
                        document.removeEventListener('touchstart', handleClickOutside);
                    };
                }, [isOpen]);

                return (
                    <div className="relative overflow-hidden border-b border-gray-50 dark:border-darkBorder bg-white dark:bg-darkCard" ref={itemRef} style={{ touchAction: 'pan-y' }}>
                        {/* Action Buttons (Background) */}
                        <div className="absolute top-0 right-0 h-full flex items-center z-0">
                            <button 
                                onClick={(e) => { e.stopPropagation(); onToggleSettle(group); setOffsetX(0); setIsOpen(false); }}
                                className={`h-full w-[70px] ${group.is_settled ? 'bg-gray-400' : 'bg-green-500'} text-white flex flex-col items-center justify-center text-sm font-bold active:opacity-80 transition-colors`}
                            >
                                <i className={`fa-solid ${group.is_settled ? 'fa-rotate-left' : 'fa-check-double'} mb-1 text-lg`}></i>
                                {group.is_settled ? (language === 'zh' ? '撤销' : 'Undo') : (language === 'zh' ? '结清' : 'Settle')}
                            </button>
                            <button 
                                onClick={(e) => { e.stopPropagation(); onDelete(group); setOffsetX(0); setIsOpen(false); }}
                                className="h-full w-[70px] bg-red-500 text-white flex flex-col items-center justify-center text-sm font-bold active:bg-red-600 transition-colors"
                            >
                                <i className="fa-solid fa-trash-can mb-1 text-lg"></i>
                                {language === 'zh' ? '删除' : 'Delete'}
                            </button>
                        </div>

                        {/* Main Content (Foreground) */}
                        <div 
                            className={`relative z-10 flex items-center p-4 bg-white dark:bg-darkCard cursor-pointer active:bg-gray-50 dark:active:bg-darkBorder ${isSwipingRef.current ? '' : 'transition-transform duration-300'}`}
                            style={{ transform: `translateX(${offsetX}px)` }}
                            onClick={() => {
                                if (isOpen) {
                                    setOffsetX(0);
                                    setIsOpen(false);
                                } else {
                                    onClick();
                                }
                            }}
                            onTouchStart={handleTouchStart}
                            onTouchMove={handleTouchMove}
                            onTouchEnd={handleTouchEnd}
                            onMouseDown={handleTouchStart}
                            onMouseMove={handleTouchMove}
                            onMouseUp={handleTouchEnd}
                            onMouseLeave={handleTouchEnd}
                        >
                            <div className={`w-12 h-12 rounded-xl flex items-center justify-center text-white font-bold text-lg shadow-sm shrink-0 transition-colors ${group.is_settled ? 'bg-gray-300 dark:bg-gray-600' : 'bg-gradient-to-br from-primaryLight to-primary'}`}>
                                {group.name.substring(0, 2)}
                            </div>
                            <div className="ml-4 flex-1 overflow-hidden">
                                <div className="flex justify-between items-center mb-1">
                                    <h3 className={`font-bold truncate transition-colors ${group.is_settled ? 'text-gray-400 dark:text-gray-500 line-through' : 'text-textMain dark:text-darkTextMain'}`}>
                                        {group.name}
                                    </h3>
                                    <span className="text-xs text-textSub whitespace-nowrap">{formatActivityTime(group.last_activity)}</span>
                                </div>
                                <p className="text-sm text-textSub truncate">
                                    {group.is_settled ? (language === 'zh' ? '此账已结清' : 'Settled') : t.clickToEnter}
                                </p>
                            </div>
                            {group.is_settled && (
                                <div className="ml-2 w-6 h-6 rounded-full bg-green-50 dark:bg-green-900/20 text-green-500 flex items-center justify-center shrink-0">
                                    <i className="fa-solid fa-check text-xs"></i>
                                </div>
                            )}
                        </div>
                    </div>
                );
            };

            const renderScreen = () => {
                if (showLogin || !currentUser) {
                    return (
                        <div className="max-w-md mx-auto min-h-[100dvh] bg-secondary flex flex-col justify-center p-6 animate-fade-in relative">
                            <div className="w-20 h-20 bg-white rounded-[2rem] shadow-float flex items-center justify-center text-primary mb-8 mx-auto">
                                <i className="fa-solid fa-wallet text-4xl"></i>
                            </div>
                            <h1 className="text-3xl font-bold text-center mb-8">PayClear</h1>
                            
                            <div className="flex justify-center gap-4 mb-6">
                                <button className={`pb-2 font-bold ${loginMode === 'login' ? 'text-primary border-b-2 border-primary' : 'text-textSub border-b-2 border-transparent'}`} onClick={() => setLoginMode('login')}>{t.login}</button>
                                <button className={`pb-2 font-bold ${loginMode === 'register' ? 'text-primary border-b-2 border-primary' : 'text-textSub border-b-2 border-transparent'}`} onClick={() => setLoginMode('register')}>{t.register}</button>
                            </div>

                            <form onSubmit={handleLoginSubmit} className="space-y-4 bg-white dark:bg-darkCard p-6 rounded-2xl shadow-soft">
                                <div>
                                    <label className="block text-sm font-bold text-textSub mb-2">{t.username}</label>
                                    <input type="text" value={loginName} onChange={e => setLoginName(e.target.value)} className="w-full p-4 bg-secondary dark:bg-darkBg dark:text-darkTextMain rounded-xl font-medium" placeholder={language === 'zh' ? "例如：Alice" : "e.g. Alice"} required />
                                </div>
                                <div>
                                    <label className="block text-sm font-bold text-textSub mb-2">{t.password}</label>
                                    <input type="password" value={loginPassword} onChange={e => setLoginPassword(e.target.value)} className="w-full p-4 bg-secondary dark:bg-darkBg dark:text-darkTextMain rounded-xl font-medium" placeholder={language === 'zh' ? "输入密码" : "Enter Password"} required />
                                </div>
                                <button type="submit" className="w-full bg-primary text-white font-bold py-4 rounded-xl shadow-float active:scale-95 transition-all mt-4">
                                    {loginMode === 'login' ? t.enterSys : t.createAcc}
                                </button>
                            </form>
                        </div>
                    );
                }

                // --- Screen: Tutorial ---
            if (activeScreen === 'tutorial') {
                return (
                    <div className="flex flex-col h-[100dvh] w-full bg-[#f9f9f9] animate-fade-in relative overflow-hidden">

                            <div className="flex items-center gap-3 mt-4">
                                <button onClick={() => setActiveScreen('dashboard')} className="w-8 h-8 flex items-center justify-center active:scale-90 transition-transform text-textMain dark:text-darkTextMain"><i className="fa-solid fa-angle-left text-xl"></i></button>

                                <div className="flex items-center gap-3 mb-4">
                                    <div className="w-10 h-10 bg-blue-100 dark:bg-blue-900/30 text-blue-500 dark:text-blue-400 rounded-full flex items-center justify-center text-lg"><i className="fa-solid fa-user-group"></i></div>
                                    <h3 className="font-bold text-lg dark:text-darkTextMain">1. {language === 'zh' ? '建立联系' : 'Connect'}</h3>
                                </div>
                                <p className="text-textSub dark:text-darkTextSub text-sm leading-relaxed mb-2">
                                    {language === 'zh' ? '在“通讯录”页通过搜索昵称/ID或扫描专属二维码，快速添加您的同行好友或室友。' : 'Search by name/ID or scan QR codes in the Discover tab to quickly add your friends.'}
                                </p>
                            </div>

                            <div className="bg-white dark:bg-darkCard rounded-2xl p-5 card-shadow">
                                <div className="flex items-center gap-3 mb-4">
                                    <div className="w-10 h-10 bg-green-100 dark:bg-green-900/30 text-green-500 dark:text-green-400 rounded-full flex items-center justify-center text-lg"><i className="fa-solid fa-users-viewfinder"></i></div>
                                    <h3 className="font-bold text-lg dark:text-darkTextMain">2. {language === 'zh' ? '创建分账群聊' : 'Create Group'}</h3>
                                </div>
                                <p className="text-textSub dark:text-darkTextSub text-sm leading-relaxed mb-2">
                                    {language === 'zh' ? '点击首页右上角“发起”，勾选需要分账的好友，即可创建一个像微信群一样的专属记账空间。' : 'Tap "New" to select friends and create a shared space for tracking expenses.'}
                                </p>
                            </div>

                            <div className="bg-white dark:bg-darkCard rounded-2xl p-5 card-shadow">
                                <div className="flex items-center gap-3 mb-4">
                                    <div className="w-10 h-10 bg-primaryLight dark:bg-primary/20 text-primary rounded-full flex items-center justify-center text-lg"><i className="fa-solid fa-wand-magic-sparkles"></i></div>
                                    <h3 className="font-bold text-lg dark:text-darkTextMain">3. {t.chatRecord}</h3>
                                </div>
                                <div className="space-y-3">
                                    <div className="flex items-start gap-3 bg-gray-50 dark:bg-darkBorder p-3 rounded-xl">
                                        <div className="w-8 h-8 rounded-full bg-white dark:bg-darkCard flex items-center justify-center shadow-sm shrink-0">🤖</div>
                                        <div>
                                            <div className="font-bold text-sm text-textMain dark:text-darkTextMain mb-1">{language === 'zh' ? 'AI 自动识别' : 'AI Detection'}</div>
                                            <div className="text-xs text-textSub dark:text-darkTextSub leading-relaxed">{language === 'zh' ? '在群里发送“打车花了50”，系统会自动识别金额并填好分类。' : 'Type "spent 50 on taxi", AI auto-detects amount and category.'}</div>
                                        </div>
                                    </div>
                                    <div className="flex items-start gap-3 bg-gray-50 dark:bg-darkBorder p-3 rounded-xl">
                                        <div className="w-8 h-8 rounded-full bg-white dark:bg-darkCard flex items-center justify-center shadow-sm shrink-0">💱</div>
                                        <div>
                                            <div className="font-bold text-sm text-textMain dark:text-darkTextMain mb-1">{language === 'zh' ? '实时汇率换算' : 'Live Exchange Rates'}</div>
                                            <div className="text-xs text-textSub dark:text-darkTextSub leading-relaxed">{language === 'zh' ? '支持多国货币录入，自动按最新实时汇率折算为主货币。' : 'Supports multi-currency input with live conversion.'}</div>
                                        </div>
                                    </div>
                                    <div className="flex items-start gap-3 bg-gray-50 dark:bg-darkBorder p-3 rounded-xl">
                                        <div className="w-8 h-8 rounded-full bg-white dark:bg-darkCard flex items-center justify-center shadow-sm shrink-0">✏️</div>
                                        <div>
                                            <div className="font-bold text-sm text-textMain dark:text-darkTextMain mb-1">{language === 'zh' ? '随时撤回修改' : 'Edit Anytime'}</div>
                                            <div className="text-xs text-textSub dark:text-darkTextSub leading-relaxed">{language === 'zh' ? '账单记错了？直接点击群聊里的账单卡片，随时修改金额或删除重记。' : 'Made a mistake? Tap the bill card to edit or delete.'}</div>
                                        </div>
                                    </div>
                                </div>
                            </div>

                            <div className="bg-white dark:bg-darkCard rounded-2xl p-5 card-shadow">
                                <div className="flex items-center gap-3 mb-4">
                                    <div className="w-10 h-10 bg-orange-100 dark:bg-orange-900/30 text-orange-500 dark:text-orange-400 rounded-full flex items-center justify-center text-lg"><i className="fa-solid fa-dice"></i></div>
                                    <h3 className="font-bold text-lg dark:text-darkTextMain">4. {language === 'zh' ? '趣味结账与清算' : 'Fun & Settlement'}</h3>
                                </div>
                                <div className="space-y-3">
                                    <div className="flex items-start gap-3 bg-gray-50 dark:bg-darkBorder p-3 rounded-xl">
                                        <div className="w-8 h-8 rounded-full bg-white dark:bg-darkCard flex items-center justify-center shadow-sm shrink-0">🎲</div>
                                        <div>
                                            <div className="font-bold text-sm text-textMain dark:text-darkTextMain mb-1">{t.playGame}</div>
                                            <div className="text-xs text-textSub dark:text-darkTextSub leading-relaxed">{language === 'zh' ? '不知道这顿谁请？内置摇骰子、炸弹扑克、大转盘，游戏决定谁付款！' : 'Can\'t decide who pays? Use roulette, cards or dice!'}</div>
                                        </div>
                                    </div>
                                    <div className="flex items-start gap-3 bg-gray-50 dark:bg-darkBorder p-3 rounded-xl">
                                        <div className="w-8 h-8 rounded-full bg-white dark:bg-darkCard flex items-center justify-center shadow-sm shrink-0">📊</div>
                                        <div>
                                            <div className="font-bold text-sm text-textMain dark:text-darkTextMain mb-1">{t.smartSettle}</div>
                                            <div className="text-xs text-textSub dark:text-darkTextSub leading-relaxed">{language === 'zh' ? '点击群组右上角“结算”，系统自动计算全员最优还款路径，告别糊涂账。' : 'Tap "Settle Up" to calculate optimal repayment routes.'}</div>
                                        </div>
                                    </div>
                                </div>
                            </div>

                            <div className="bg-white dark:bg-darkCard rounded-2xl p-5 card-shadow">
                                <div className="flex items-center gap-3 mb-4">
                                    <div className="w-10 h-10 bg-teal-100 dark:bg-teal-900/30 text-teal-500 dark:text-teal-400 rounded-full flex items-center justify-center text-lg"><i className="fa-solid fa-bolt"></i></div>
                                    <h3 className="font-bold text-lg dark:text-darkTextMain">5. {language === 'zh' ? '进阶手势与专属键盘' : 'Gestures & Custom Keyboard'}</h3>
                                </div>
                                <div className="space-y-3">
                                    <div className="flex items-start gap-3 bg-gray-50 dark:bg-darkBorder p-3 rounded-xl">
                                        <div className="w-8 h-8 rounded-full bg-white dark:bg-darkCard flex items-center justify-center shadow-sm shrink-0">👈</div>
                                        <div>
                                            <div className="font-bold text-sm text-textMain dark:text-darkTextMain mb-1">{language === 'zh' ? '左滑管理群聊' : 'Swipe Left to Manage'}</div>
                                            <div className="text-xs text-textSub dark:text-darkTextSub leading-relaxed">{language === 'zh' ? '在首页列表中向左滑动群聊卡片，即可快速结清或彻底删除群聊。' : 'Swipe left on any group card to quickly settle or delete it.'}</div>
                                        </div>
                                    </div>

                                        <div>
                                            <div className="font-bold text-sm text-textMain dark:text-darkTextMain mb-1">{language === 'zh' ? '上滑清除通知' : 'Swipe Up to Dismiss'}</div>
                                            <div className="text-xs text-textSub dark:text-darkTextSub leading-relaxed">{language === 'zh' ? '当顶部弹出系统通知时，手指按住向上滑动即可立即清除。' : 'Swipe up on top notifications to dismiss them instantly.'}</div>

            // --- Screen: About ---

                            <div className="flex items-center gap-3 mt-4">

                        </div>
                        <div className="flex-1 overflow-y-auto flex flex-col items-center justify-center pb-20">
                            <div className="w-24 h-24 bg-primary text-white rounded-[2rem] flex items-center justify-center text-5xl mb-6 shadow-[0_10px_30px_rgba(255,36,66,0.3)]">
                                <i className="fa-solid fa-wallet"></i>
                            </div>
                            <h2 className="text-2xl font-bold text-textMain dark:text-darkTextMain mb-2">PayClear Pro</h2>
                            <p className="text-textSub dark:text-darkTextSub font-medium mb-8">Version 2.0.0</p>
                            
                            <div className="w-full px-10 space-y-4">
                                <div className="flex justify-between items-center py-3 border-b border-gray-100 dark:border-darkBorder cursor-pointer active:bg-gray-50 dark:active:bg-darkCard" onClick={() => {
                                    if(isCheckingUpdate) return;
                                    setIsCheckingUpdate(true);
                                    setTimeout(() => {
                                        setIsCheckingUpdate(false);
                                        showToast(t.alreadyLatest);
                                    }, 1500);
                                }}>
                                    <span className="text-textMain dark:text-darkTextMain font-medium">{t.checkUpdate}</span>
                                    <span className="text-textSub dark:text-darkTextSub text-sm">
                                        {isCheckingUpdate ? <i className="fa-solid fa-spinner fa-spin"></i> : <span>{t.latestVer} <i className="fa-solid fa-angle-right ml-2"></i></span>}
                                    </span>
                                </div>
                                <div className="flex justify-between items-center py-3 border-b border-gray-100 dark:border-darkBorder cursor-pointer active:bg-gray-50 dark:active:bg-darkCard" onClick={() => setActiveScreen('terms')}>
                                    <span className="text-textMain dark:text-darkTextMain font-medium">{t.terms}</span>
                                    <i className="fa-solid fa-angle-right text-gray-300 dark:text-gray-600"></i>
                                </div>
                                <div className="flex justify-between items-center py-3 border-b border-gray-100 dark:border-darkBorder cursor-pointer active:bg-gray-50 dark:active:bg-darkCard" onClick={() => setActiveScreen('privacy')}>

                                    <i className="fa-solid fa-angle-right text-gray-300 dark:text-gray-600"></i>
                                </div>
                            </div>
                            
                            <p className="text-xs text-gray-300 dark:text-gray-600 absolute bottom-8">© 2026 PayClear. All rights reserved.</p>

            // --- Screen: Settings ---
            if (activeScreen === 'settings') {
                return (
                    <div className="flex flex-col h-[100dvh] w-full bg-[#f9f9f9] animate-fade-in relative overflow-hidden">
                        <div className="glass-header sticky top-0 z-10 px-5 pt-safe pb-3">
                            <div className="flex items-center gap-3 mt-4">
                                <button onClick={() => setActiveScreen('dashboard')} className="w-8 h-8 flex items-center justify-center active:scale-90 transition-transform text-textMain dark:text-darkTextMain"><i className="fa-solid fa-angle-left text-xl"></i></button>
